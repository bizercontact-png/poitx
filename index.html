<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberStream - Desktop Live Streaming Platform</title>
    <style>
        /* ==================== CSS Custom Properties ==================== */
        :root {
            /* Neon Colors */
            --neon-pink: #ff2d95;
            --neon-blue: #00f0ff;
            --neon-purple: #b400ff;
            --neon-green: #00ff88;
            --neon-yellow: #ffee00;
            --neon-orange: #ff6600;
            --neon-red: #ff1744;
            --neon-cyan: #00e5ff;
            
            /* Background Layers */
            --bg-abyss: #050510;
            --bg-deep: #0a0a1a;
            --bg-surface: #0f0f25;
            --bg-elevated: #151530;
            --bg-overlay: rgba(10, 10, 30, 0.9);
            
            /* Glass Effects */
            --glass-light: rgba(15, 15, 40, 0.6);
            --glass-medium: rgba(10, 10, 30, 0.8);
            --glass-heavy: rgba(5, 5, 20, 0.95);
            
            /* Borders */
            --border-dim: rgba(0, 240, 255, 0.06);
            --border-subtle: rgba(0, 240, 255, 0.12);
            --border-default: rgba(0, 240, 255, 0.2);
            --border-bright: rgba(0, 240, 255, 0.4);
            --border-active: rgba(0, 240, 255, 0.7);
            
            /* Text Hierarchy */
            --text-primary: #e8e8ff;
            --text-secondary: #b0b0d8;
            --text-muted: #7878a8;
            --text-dim: #505078;
            
            /* Shadows & Glows */
            --shadow-blue: 0 0 30px rgba(0, 240, 255, 0.3);
            --shadow-pink: 0 0 30px rgba(255, 45, 149, 0.3);
            --shadow-purple: 0 0 30px rgba(180, 0, 255, 0.3);
            --shadow-red: 0 0 30px rgba(255, 23, 68, 0.4);
            
            /* Spacing Scale */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;
            --space-12: 48px;
            --space-16: 64px;
            
            /* Border Radius */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 24px;
            --radius-full: 9999px;
            
            /* Animation Durations */
            --duration-instant: 100ms;
            --duration-fast: 200ms;
            --duration-normal: 300ms;
            --duration-slow: 500ms;
            --duration-glacial: 1000ms;
            
            /* Easing Functions */
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-spring: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            
            /* Typography */
            --font-body: 'Vazirmatn', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-display: 'Orbitron', sans-serif;
            
            /* Layout */
            --sidebar-width: 320px;
            --header-height: 64px;
        }

        /* ==================== Global Reset ==================== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-abyss);
            color: var(--text-primary);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Vazirmatn:wght@100;200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

        /* ==================== Background Effects ==================== */
        .cyber-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-gradient-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 240, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 60%, rgba(180, 0, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255, 45, 149, 0.04) 0%, transparent 50%);
            animation: gradientShift 15s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 0.7; }
            25% { opacity: 1; }
            50% { opacity: 0.8; }
            75% { opacity: 0.9; }
        }

        .bg-grid-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridPan 25s linear infinite;
        }

        @keyframes gridPan {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .bg-particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--neon-blue);
            box-shadow: 0 0 8px var(--neon-blue);
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        /* ==================== Main Layout ==================== */
        .app-layout {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            gap: 0;
        }

        /* ==================== Stream Area ==================== */
        .stream-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--bg-deep);
            border-right: 1px solid var(--border-dim);
        }

        .stream-header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--space-6);
            background: var(--glass-heavy);
            border-bottom: 1px solid var(--border-subtle);
            backdrop-filter: blur(20px);
        }

        .streamer-info {
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }

        .streamer-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: white;
            border: 2px solid var(--border-bright);
            box-shadow: var(--shadow-blue);
        }

        .streamer-details h3 {
            font-size: 1.1rem;
            font-weight: 700;
            font-family: var(--font-display);
            letter-spacing: 1px;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            padding: var(--space-1) var(--space-3);
            background: rgba(255, 23, 68, 0.2);
            border: 1px solid var(--neon-red);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            color: var(--neon-red);
            font-weight: 700;
            animation: livePulse 2s infinite;
        }

        @keyframes livePulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 23, 68, 0.3); }
            50% { box-shadow: 0 0 25px rgba(255, 23, 68, 0.7); }
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--neon-red);
            border-radius: 50%;
            animation: dotBlink 1s infinite;
        }

        @keyframes dotBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .viewer-count {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .stream-controls {
            display: flex;
            gap: var(--space-3);
            align-items: center;
        }

        .control-btn {
            padding: var(--space-3) var(--space-5);
            background: var(--glass-light);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-smooth);
            font-family: var(--font-body);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: var(--space-2);
            white-space: nowrap;
        }

        .control-btn:hover {
            border-color: var(--border-bright);
            box-shadow: var(--shadow-blue);
            transform: translateY(-1px);
        }

        .control-btn.start-stream {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(0, 200, 255, 0.1));
            border-color: var(--neon-blue);
            box-shadow: var(--shadow-blue);
        }

        .control-btn.stop-stream {
            background: linear-gradient(135deg, rgba(255, 23, 68, 0.2), rgba(255, 45, 149, 0.1));
            border-color: var(--neon-red);
            box-shadow: var(--shadow-red);
        }

        .stream-container {
            flex: 1;
            position: relative;
            background: var(--bg-abyss);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .stream-preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border: 1px solid var(--border-dim);
        }

        .stream-placeholder {
            text-align: center;
            color: var(--text-dim);
        }

        .stream-placeholder .icon {
            font-size: 5rem;
            margin-bottom: var(--space-4);
            opacity: 0.5;
        }

        .stream-placeholder h3 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            margin-bottom: var(--space-2);
            letter-spacing: 2px;
        }

        .stream-placeholder p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .recording-indicator {
            position: absolute;
            top: var(--space-4);
            right: var(--space-4);
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-4);
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--neon-red);
            border-radius: var(--radius-full);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--neon-red);
            animation: livePulse 2s infinite;
        }

        /* ==================== Chat Sidebar ==================== */
        .chat-sidebar {
            width: var(--sidebar-width);
            display: flex;
            flex-direction: column;
            background: var(--bg-surface);
            border-left: 1px solid var(--border-dim);
        }

        .chat-sidebar-header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--space-4);
            background: var(--glass-heavy);
            border-bottom: 1px solid var(--border-subtle);
            backdrop-filter: blur(20px);
        }

        .chat-title {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .online-users {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--neon-green);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-4);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border-default);
            border-radius: var(--radius-full);
        }

        .chat-message {
            animation: messageSlideIn 0.3s ease-out;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin-bottom: var(--space-1);
        }

        .message-username {
            font-weight: 700;
            font-size: 0.85rem;
        }

        .message-username.streamer {
            color: var(--neon-blue);
        }

        .message-username.viewer {
            color: var(--neon-pink);
        }

        .message-badge {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            font-weight: 700;
        }

        .badge-streamer {
            background: rgba(0, 240, 255, 0.2);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
        }

        .message-time {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-right: auto;
        }

        .message-text {
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-secondary);
            padding-right: var(--space-6);
        }

        .system-message {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: var(--space-2);
            font-style: italic;
        }

        .chat-input-area {
            padding: var(--space-4);
            border-top: 1px solid var(--border-subtle);
            background: var(--glass-heavy);
        }

        .chat-input-wrapper {
            display: flex;
            gap: var(--space-2);
        }

        .chat-input {
            flex: 1;
            padding: var(--space-3) var(--space-4);
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-full);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.85rem;
            transition: all var(--duration-fast) var(--ease-smooth);
            outline: none;
        }

        .chat-input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
        }

        .chat-send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            border: none;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.3);
        }

        .chat-send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(0, 240, 255, 0.5);
        }

        .chat-send-btn:active {
            transform: scale(0.95);
        }

        /* ==================== Recording Controls Panel ==================== */
        .recording-panel {
            position: absolute;
            bottom: var(--space-4);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-5);
            background: var(--glass-medium);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-2xl);
            z-index: 50;
        }

        .recording-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
            position: relative;
        }

        .btn-record {
            background: linear-gradient(135deg, var(--neon-red), #d50000);
            box-shadow: var(--shadow-red);
            animation: recordPulse 2s infinite;
        }

        @keyframes recordPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 23, 68, 0.4); }
            50% { box-shadow: 0 0 35px rgba(255, 23, 68, 0.8); }
        }

        .btn-pause {
            background: var(--glass-light);
            border: 1px solid var(--border-default);
        }

        .btn-stop {
            background: var(--glass-light);
            border: 1px solid var(--border-default);
        }

        .btn-download {
            background: linear-gradient(135deg, var(--neon-green), #00c853);
            box-shadow: var(--glow-green);
        }

        .recording-timer {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            color: var(--neon-red);
            display: flex;
            align-items: center;
            padding: 0 var(--space-4);
        }

        /* ==================== Responsive Design ==================== */
        @media (max-width: 1024px) {
            .chat-sidebar {
                width: 280px;
            }
        }

        @media (max-width: 768px) {
            .app-layout {
                flex-direction: column;
            }
            
            .stream-area {
                height: 60%;
                border-right: none;
                border-bottom: 1px solid var(--border-dim);
            }
            
            .chat-sidebar {
                width: 100%;
                flex: 1;
                border-left: none;
            }
            
            .stream-controls {
                gap: var(--space-2);
            }
            
            .control-btn {
                padding: var(--space-2) var(--space-3);
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="cyber-background">
        <div class="bg-gradient-layer"></div>
        <div class="bg-grid-layer"></div>
        <div class="bg-particles" id="particlesContainer"></div>
    </div>

    <!-- Main Application -->
    <div class="app-layout">
        <!-- Stream Area (Left Side) -->
        <div class="stream-area">
            <!-- Stream Header -->
            <div class="stream-header">
                <div class="streamer-info">
                    <div class="streamer-avatar">ا</div>
                    <div class="streamer-details">
                        <h3>ابوالفضل</h3>
                        <span class="live-badge" id="liveBadge" style="display: none;">
                            <span class="live-dot"></span>
                            LIVE
                        </span>
                    </div>
                </div>
                
                <div class="stream-controls">
                    <span class="viewer-count" id="viewerCount">👤 1 بیننده</span>
                    <button class="control-btn start-stream" id="startStreamBtn" onclick="startScreenShare()">
                        🎥 شروع استریم
                    </button>
                    <button class="control-btn stop-stream" id="stopStreamBtn" onclick="stopScreenShare()" style="display: none;">
                        ⏹️ توقف استریم
                    </button>
                </div>
            </div>

            <!-- Stream Container -->
            <div class="stream-container" id="streamContainer">
                <video class="stream-preview" id="streamVideo" autoplay muted playsinline style="display: none;"></video>
                <div class="stream-placeholder" id="streamPlaceholder">
                    <div class="icon">🖥️</div>
                    <h3>CyberStream Pro</h3>
                    <p>برای شروع استریم دسکتاپ کلیک کنید</p>
                </div>
                
                <!-- Recording Timer (hidden initially) -->
                <div class="recording-indicator" id="recordingIndicator" style="display: none;">
                    🔴 <span id="recordingTimer">00:00</span>
                </div>
            </div>
        </div>

        <!-- Chat Sidebar (Right Side) -->
        <div class="chat-sidebar">
            <!-- Chat Header -->
            <div class="chat-sidebar-header">
                <span class="chat-title">💬 چت زنده</span>
                <span class="online-users" id="onlineUsers">🟢 1 آنلاین</span>
            </div>

            <!-- Chat Messages -->
            <div class="chat-messages" id="chatMessages">
                <div class="system-message">
                    🚀 به CyberStream خوش آمدید
                </div>
            </div>

            <!-- Chat Input -->
            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <input 
                        type="text" 
                        class="chat-input" 
                        id="chatInput" 
                        placeholder="پیام خود را بنویسید..."
                        onkeypress="handleChatKeyPress(event)"
                    >
                    <button class="chat-send-btn" onclick="sendChatMessage()">
                        ➤
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CyberStream Core Application ====================
        class CyberStreamApp {
            constructor() {
                // Application State
                this.state = {
                    isStreaming: false,
                    isRecording: false,
                    isPaused: false,
                    mediaStream: null,
                    mediaRecorder: null,
                    recordedChunks: [],
                    recordingStartTime: null,
                    recordingTimerInterval: null,
                    currentUser: {
                        name: 'ابوالفضل',
                        role: 'streamer'
                    },
                    viewer: {
                        name: 'مهدیار',
                        role: 'viewer'
                    }
                };

                // Initialize application
                this.init();
            }

            init() {
                this.createParticles();
                this.setupAutoResponse();
                this.addSystemMessage('سیستم آماده به کار است');
                
                // Welcome message from viewer (simulating Mehdiar joining)
                setTimeout(() => {
                    this.addMessage('مهدیار', 'سلام ابوالفضل! آماده‌ی استریم هستی؟ 😎', 'viewer');
                }, 1500);
            }

            // ==================== Screen Capture ====================
            async startScreenShare() {
                try {
                    // Request screen capture with audio
                    const stream = await navigator.mediaDevices.getDisplayMedia({
                        video: {
                            cursor: 'always',
                            displaySurface: 'monitor',
                            logicalSurface: true
                        },
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            sampleRate: 44100
                        }
                    });

                    this.state.mediaStream = stream;
                    this.state.isStreaming = true;

                    // Display stream in video element
                    const videoElement = document.getElementById('streamVideo');
                    videoElement.srcObject = stream;
                    videoElement.style.display = 'block';
                    
                    // Hide placeholder
                    document.getElementById('streamPlaceholder').style.display = 'none';
                    
                    // Show live badge
                    document.getElementById('liveBadge').style.display = 'inline-flex';
                    
                    // Update buttons
                    document.getElementById('startStreamBtn').style.display = 'none';
                    document.getElementById('stopStreamBtn').style.display = 'inline-flex';
                    
                    // Start recording automatically
                    this.startRecording(stream);
                    
                    // Notify in chat
                    this.addSystemMessage('🔴 استریم شروع شد - ابوالفضل در حال اشتراک‌گذاری دسکتاپ است');
                    this.addMessage('مهدیار', 'اوه! استریم شروع شد، صفحه‌ات رو می‌بینم 🖥️', 'viewer');
                    
                    // Update viewer count
                    document.getElementById('viewerCount').textContent = '👤 2 بیننده';
                    document.getElementById('onlineUsers').textContent = '🟢 2 آنلاین';

                    // Handle stream stop by user
                    stream.getVideoTracks()[0].addEventListener('ended', () => {
                        this.stopScreenShare();
                    });

                } catch (error) {
                    console.error('Error capturing screen:', error);
                    this.addSystemMessage('❌ خطا در شروع استریم: ' + error.message);
                }
            }

            stopScreenShare() {
                // Stop all tracks
                if (this.state.mediaStream) {
                    this.state.mediaStream.getTracks().forEach(track => track.stop());
                    this.state.mediaStream = null;
                }

                // Stop recording
                if (this.state.isRecording) {
                    this.stopRecording();
                }

                this.state.isStreaming = false;

                // Hide video
                const videoElement = document.getElementById('streamVideo');
                videoElement.srcObject = null;
                videoElement.style.display = 'none';
                
                // Show placeholder
                document.getElementById('streamPlaceholder').style.display = 'block';
                
                // Hide live badge
                document.getElementById('liveBadge').style.display = 'none';
                
                // Update buttons
                document.getElementById('startStreamBtn').style.display = 'inline-flex';
                document.getElementById('stopStreamBtn').style.display = 'none';
                
                // Update viewer count
                document.getElementById('viewerCount').textContent = '👤 1 بیننده';
                document.getElementById('onlineUsers').textContent = '🟢 1 آنلاین';
                
                // Notify in chat
                this.addSystemMessage('⏹️ استریم به پایان رسید');
                this.addMessage('مهدیار', 'استریم تموم شد؟ چقدر جالب بود! 😍', 'viewer');
            }

            // ==================== Recording Functions ====================
            startRecording(stream) {
                this.state.recordedChunks = [];
                
                // Check for supported MIME types
                let mimeType = 'video/webm;codecs=vp9';
                if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = 'video/webm;codecs=vp8';
                    if (!MediaRecorder.isTypeSupported(mimeType)) {
                        mimeType = 'video/webm';
                    }
                }

                const mediaRecorder = new MediaRecorder(stream, {
                    mimeType: mimeType,
                    videoBitsPerSecond: 5000000 // 5 Mbps for quality
                });

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        this.state.recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    this.saveRecording();
                };

                mediaRecorder.start(1000); // Collect data every second
                this.state.mediaRecorder = mediaRecorder;
                this.state.isRecording = true;
                this.state.recordingStartTime = Date.now();
                
                // Start timer
                this.startRecordingTimer();
                
                // Show recording indicator
                document.getElementById('recordingIndicator').style.display = 'flex';
                
                this.addSystemMessage('🔴 ضبط شروع شد');
            }

            pauseRecording() {
                if (this.state.mediaRecorder && this.state.mediaRecorder.state === 'recording') {
                    this.state.mediaRecorder.pause();
                    this.state.isPaused = true;
                    this.stopRecordingTimer();
                    this.addSystemMessage('⏸️ ضبط متوقف شد');
                }
            }

            resumeRecording() {
                if (this.state.mediaRecorder && this.state.mediaRecorder.state === 'paused') {
                    this.state.mediaRecorder.resume();
                    this.state.isPaused = false;
                    this.startRecordingTimer();
                    this.addSystemMessage('▶️ ضبط از سر گرفته شد');
                }
            }

            stopRecording() {
                if (this.state.mediaRecorder && this.state.mediaRecorder.state !== 'inactive') {
                    this.state.mediaRecorder.stop();
                    this.state.isRecording = false;
                    this.state.isPaused = false;
                    this.stopRecordingTimer();
                    
                    // Hide recording indicator
                    document.getElementById('recordingIndicator').style.display = 'none';
                }
            }

            saveRecording() {
                if (this.state.recordedChunks.length === 0) return;

                const blob = new Blob(this.state.recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                
                // Create download link
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                const filename = `CyberStream_Recording_${timestamp}.webm`;
                
                // Auto-download
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                // Cleanup
                URL.revokeObjectURL(url);
                this.state.recordedChunks = [];
                
                this.addSystemMessage('💾 ضبط با موفقیت ذخیره شد: ' + filename);
                this.addMessage('مهدیار', 'عالیه! ضبط رو دانلود کردم 🎬', 'viewer');
            }

            startRecordingTimer() {
                const updateTimer = () => {
                    if (!this.state.recordingStartTime) return;
                    
                    const elapsed = Math.floor((Date.now() - this.state.recordingStartTime) / 1000);
                    const hours = Math.floor(elapsed / 3600);
                    const minutes = Math.floor((elapsed % 3600) / 60);
                    const seconds = elapsed % 60;
                    
                    const timerStr = [
                        hours.toString().padStart(2, '0'),
                        minutes.toString().padStart(2, '0'),
                        seconds.toString().padStart(2, '0')
                    ].join(':');
                    
                    document.getElementById('recordingTimer').textContent = timerStr;
                };

                updateTimer();
                this.state.recordingTimerInterval = setInterval(updateTimer, 1000);
            }

            stopRecordingTimer() {
                if (this.state.recordingTimerInterval) {
                    clearInterval(this.state.recordingTimerInterval);
                    this.state.recordingTimerInterval = null;
                }
            }

            // ==================== Chat System ====================
            addMessage(username, text, role) {
                const chatMessages = document.getElementById('chatMessages');
                const now = new Date();
                const timeStr = now.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
                
                const messageDiv = document.createElement('div');
                messageDiv.className = 'chat-message';
                
                const isStreamer = role === 'streamer';
                
                messageDiv.innerHTML = `
                    <div class="message-header">
                        <span class="message-username ${isStreamer ? 'streamer' : 'viewer'}">${username}</span>
                        ${isStreamer ? '<span class="message-badge badge-streamer">STR</span>' : ''}
                        <span class="message-time">${timeStr}</span>
                    </div>
                    <div class="message-text">${this.escapeHtml(text)}</div>
                `;
                
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            addSystemMessage(text) {
                const chatMessages = document.getElementById('chatMessages');
                const div = document.createElement('div');
                div.className = 'system-message';
                div.textContent = text;
                chatMessages.appendChild(div);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            sendChatMessage() {
                const input = document.getElementById('chatInput');
                const text = input.value.trim();
                
                if (!text) return;
                
                // Add as streamer message
                this.addMessage('ابوالفضل', text, 'streamer');
                input.value = '';
                
                // Simulate viewer response (Mehdiar)
                this.scheduleViewerResponse(text);
            }

            scheduleViewerResponse(streamerMessage) {
                const responseDelay = 1000 + Math.random() * 3000;
                
                setTimeout(() => {
                    const responses = this.generateViewerResponse(streamerMessage);
                    const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                    this.addMessage('مهدیار', randomResponse, 'viewer');
                }, responseDelay);
            }

            generateViewerResponse(message) {
                const lowerMsg = message.toLowerCase();
                
                if (lowerMsg.includes('سلام') || lowerMsg.includes('خوبی')) {
                    return ['سلام! خیلی خوبم، مرسی 🙌', 'سلاممم! استریم عالی شده ✨', 'سلام ابوالفضل! منتظر استریمت بودم'];
                }
                
                if (lowerMsg.includes('چطور') || lowerMsg.includes('چطوره')) {
                    return ['عالیه! خیلی با کیفیت می‌بینم 🎯', 'فوق‌العاده‌ست! ادامه بده 💪', 'صفحه‌ات رو واضح می‌بینم'];
                }
                
                if (lowerMsg.includes('کد') || lowerMsg.includes('برنامه')) {
                    return ['وااای این کد چقدر تمیز نوشته شده 😍', 'از چه معماری استفاده کردی؟', 'بهینه‌ست! آفرین 👏'];
                }
                
                return [
                    'درسته! 👍',
                    'جالبه، ادامه بده 🚀',
                    'متوجه شدم، خوب توضیح دادی 👌',
                    'آها! الان فهمیدم 😎',
                    'باحاله! بیشتر بگو 🎉',
                    'دقیقاً! موافقم 💯',
                    'حرفه‌ای داری کار می‌کنی 🔥',
                    'این قسمت رو دوباره توضیح میدی؟ 🤔'
                ];
            }

            setupAutoResponse() {
                // Random viewer comments every 30-60 seconds
                setInterval(() => {
                    if (this.state.isStreaming) {
                        const randomComments = [
                            'هنوز دارم می‌بینمت، عالی پیش میری 🎯',
                            'صفحه‌ات خیلی تمیزه! چطور مرتب نگهش میداری؟',
                            'میشه یه بار دیگه اون قسمت رو نشون بدی؟ 🙏',
                            'این قسمت خیلی جالب بود 🔥',
                            'چقدر سریع تایپ می‌کنی! 😲',
                            'صدات واضح میاد، تنظیمات میکروفون عالیه',
                            'اینو ببینم چطور حلش کردی 👀'
                        ];
                        
                        const random = randomComments[Math.floor(Math.random() * randomComments.length)];
                        if (Math.random() > 0.5) { // 50% chance
                            this.addMessage('مهدیار', random, 'viewer');
                        }
                    }
                }, 35000);
            }

            handleChatKeyPress(event) {
                if (event.key === 'Enter' && !event.shiftKey) {
                    event.preventDefault();
                    this.sendChatMessage();
                }
            }

            // ==================== Utility Functions ====================
            createParticles() {
                const container = document.getElementById('particlesContainer');
                const colors = ['var(--neon-blue)', 'var(--neon-purple)', 'var(--neon-pink)', 'var(--neon-cyan)'];
                
                for (let i = 0; i < 35; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDuration = (Math.random() * 10 + 8) + 's';
                    particle.style.animationDelay = Math.random() * 10 + 's';
                    particle.style.width = (Math.random() * 3 + 1) + 'px';
                    particle.style.height = particle.style.width;
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    container.appendChild(particle);
                }
            }

            escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, m => map[m]);
            }
        }

        // ==================== Global Functions for HTML ====================
        const app = new CyberStreamApp();

        function startScreenShare() { app.startScreenShare(); }
        function stopScreenShare() { app.stopScreenShare(); }
        function sendChatMessage() { app.sendChatMessage(); }
        function handleChatKeyPress(event) { app.handleChatKeyPress(event); }
    </script>
</body>
</html>
