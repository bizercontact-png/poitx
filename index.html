<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Pars</title>
    <style>
        /* حذف همه حاشیه‌ها و فضای اضافی */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* تنظیمات کل صفحه: سیاه و سفید */
        body {
            background-color: black;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* استایل متن سفید با سایه‌ی ملایم و افکت محو */
        h1 {
            color: white;
            font-size: 3.5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            animation: fadeIn 1.5s ease-in-out;
        }

        /* انیمیشن محو شدن تدریجی */
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        /* برای نمایش در موبایل */
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <h1>Study Pars</h1>
</body>
</html>
