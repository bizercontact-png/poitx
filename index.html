<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تماس تصویری POITX</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        // اگر peerjs از unpkg لود نشد، از cdnjs تلاش کن
        if (typeof Peer === 'undefined') {
            document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"><\/script>');
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0b0b12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .app {
            width: 100%;
            max-width: 420px;
            background: #14141e;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #f1f5f9;
        }
        .header span {
            font-size: 12px;
            color: #60a5fa;
            font-weight: 400;
        }
        .join-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .join-box label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        .join-box input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: #f1f5f9;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            margin-bottom: 12px;
        }
        .join-box input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }
        .join-box .btn-join {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .join-box .btn-join:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.25);
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            margin: 16px 0 12px;
            font-size: 13px;
            color: #94a3b8;
        }
        .status-bar .online {
            color: #34d399;
        }
        .video-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }
        .video-grid video {
            width: 100%;
            border-radius: 20px;
            background: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transform: scaleX(-1);
            max-height: 220px;
            object-fit: cover;
        }
        .call-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .call-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.04);
            color: #f1f5f9;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .call-actions .btn-call {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            color: white;
        }
        .call-actions .btn-call:hover {
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.25);
        }
        .call-actions .btn-end {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.1);
        }
        .call-actions .btn-end:hover {
            background: rgba(239, 68, 68, 0.25);
        }
        .call-actions .btn-copy {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .call-actions .btn-copy:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .peer-code {
            background: rgba(255, 255, 255, 0.02);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            color: #60a5fa;
            border: 1px dashed rgba(96, 165, 250, 0.15);
            text-align: center;
            margin: 12px 0 4px;
            word-break: break-all;
            user-select: all;
            font-family: monospace;
            letter-spacing: 0.3px;
        }
        .hidden {
            display: none !important;
        }
        .footer {
            text-align: center;
            font-size: 11px;
            color: #475569;
            margin-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            padding-top: 16px;
        }
        .footer strong {
            color: #a78bfa;
            font-weight: 500;
        }
        .error-box {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            border: 1px solid rgba(239, 68, 68, 0.1);
            margin-bottom: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app" id="app">

        <div class="header">
            <h1>📹 تماس تصویری</h1>
            <span>POITX</span>
        </div>

        <!-- خطا -->
        <div id="errorBox" class="error-box hidden">
            ⚠️ خطا در اتصال به سرور. لطفاً اینترنت خود را بررسی کنید.
        </div>

        <div id="joinSection">
            <div class="join-box">
                <label>نام گروه</label>
                <input type="text" id="groupName" placeholder="مثلاً: POITX" value="POITX" />
                <label>رمز گروه</label>
                <input type="password" id="groupPassword" placeholder="مثلاً: 1234" value="1234" />
                <button class="btn-join" id="joinBtn">ورود به گروه</button>
                <div style="font-size:12px; color:#475569; text-align:center; margin-top:10px;">
                    اگر گروه وجود نداشته باشد، ساخته می‌شود.
                </div>
            </div>
        </div>

        <div id="callSection" class="hidden">
            <div class="status-bar">
                <span>🟢 <span class="online">آنلاین</span></span>
                <span id="callStatusText">⏳ منتظر تماس...</span>
            </div>
            <div class="peer-code" id="peerCodeBox">
                کد شما: <span id="peerIdDisplay">...</span>
            </div>
            <div class="video-grid">
                <video id="localVideo" autoplay muted></video>
                <video id="remoteVideo" autoplay></video>
            </div>
            <div class="call-actions">
                <button class="btn-call" id="startCallBtn">📞 شروع تماس</button>
                <button class="btn-end" id="endCallBtn">📴 پایان</button>
                <button class="btn-copy" id="copyBtn">📋 کپی کد</button>
            </div>
            <button id="leaveBtn" style="width:100%; margin-top:12px; padding:10px; border:none; border-radius:14px; background:rgba(255,255,255,0.02); color:#64748b; font-size:13px; cursor:pointer; border:1px solid rgba(255,255,255,0.02);">
                🚪 خروج از گروه
            </button>
        </div>

        <div class="footer">
            ساخته شده توسط <strong>ابوالفضل</strong>
        </div>
    </div>

    <script>
        (function() {

            // ===== بررسی وجود Peer =====
            if (typeof Peer === 'undefined') {
                document.getElementById('errorBox').classList.remove('hidden');
                document.getElementById('errorBox').textContent = '⚠️ کتابخانه تماس تصویری لود نشد. لطفاً اینترنت خود را بررسی کنید یا از VPN استفاده کنید.';
                return;
            }

            // ===== عناصر =====
            const joinSection = document.getElementById('joinSection');
            const callSection = document.getElementById('callSection');
            const groupNameInput = document.getElementById('groupName');
            const groupPasswordInput = document.getElementById('groupPassword');
            const joinBtn = document.getElementById('joinBtn');
            const peerIdDisplay = document.getElementById('peerIdDisplay');
            const copyBtn = document.getElementById('copyBtn');
            const leaveBtn = document.getElementById('leaveBtn');
            const localVideo = document.getElementById('localVideo');
            const remoteVideo = document.getElementById('remoteVideo');
            const startCallBtn = document.getElementById('startCallBtn');
            const endCallBtn = document.getElementById('endCallBtn');
            const callStatusText = document.getElementById('callStatusText');

            let peer = null;
            let localStream = null;
            let currentCall = null;
            let myPeerId = '';

            // ===== توابع =====

            function generatePeerId(name, password) {
                const raw = name + ':' + password;
                let hash = 0;
                for (let i = 0; i < raw.length; i++) {
                    const char = raw.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                return 'poitx-' + Math.abs(hash).toString(36).substring(0, 10);
            }

            function getCamera() {
                return navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 480 }, height: { ideal: 360 } },
                    audio: true
                });
            }

            function connectPeer(peerId) {
                return new Promise((resolve, reject) => {
                    const p = new Peer(peerId, {
                        debug: 0,
                        config: {
                            iceServers: [
                                { urls: 'stun:stun.l.google.com:19302' },
                                { urls: 'stun:stun1.l.google.com:19302' }
                            ]
                        }
                    });
                    p.on('open', (id) => { resolve(p); });
                    p.on('error', (err) => { reject(err); });
                    setTimeout(() => { reject(new Error('اتصال زمان‌بر شد')); }, 12000);
                });
            }

            function answerCalls(peerInstance, stream) {
                peerInstance.on('call', (call) => {
                    call.answer(stream);
                    call.on('stream', (remoteStream) => {
                        remoteVideo.srcObject = remoteStream;
                        callStatusText.textContent = '📞 تماس برقرار';
                    });
                    call.on('close', () => {
                        remoteVideo.srcObject = null;
                        callStatusText.textContent = '⏹ تماس قطع شد';
                    });
                    currentCall = call;
                });
            }

            // ===== ورود به گروه =====
            joinBtn.addEventListener('click', async () => {
                const name = groupNameInput.value.trim() || 'POITX';
                const password = groupPasswordInput.value.trim() || '1234';
                const peerId = generatePeerId(name, password);

                joinBtn.disabled = true;
                joinBtn.textContent = '⏳ در حال اتصال...';

                try {
                    localStream = await getCamera();
                    localVideo.srcObject = localStream;

                    peer = await connectPeer(peerId);
                    myPeerId = peer.id;

                    peerIdDisplay.textContent = myPeerId;

                    joinSection.classList.add('hidden');
                    callSection.classList.remove('hidden');

                    answerCalls(peer, localStream);
                    callStatusText.textContent = '🟢 آماده تماس';

                } catch (err) {
                    alert('خطا: ' + err.message);
                    if (localStream) {
                        localStream.getTracks().forEach(t => t.stop());
                        localStream = null;
                    }
                    if (peer) { peer.destroy();
                        peer = null; }
                } finally {
                    joinBtn.disabled = false;
                    joinBtn.textContent = 'ورود به گروه';
                }
            });

            // ===== شروع تماس =====
            startCallBtn.addEventListener('click', async () => {
                if (!peer || !localStream) { alert('ابتدا وارد گروه شوید.'); return; }
                if (currentCall) { alert('تماس در حال برقراری است.'); return; }

                const otherId = prompt('کد شخص مقابل را وارد کنید:');
                if (!otherId) return;

                try {
                    const call = peer.call(otherId, localStream);
                    call.on('stream', (remoteStream) => {
                        remoteVideo.srcObject = remoteStream;
                        callStatusText.textContent = '📞 تماس برقرار';
                    });
                    call.on('close', () => {
                        remoteVideo.srcObject = null;
                        callStatusText.textContent = '⏹ تماس قطع شد';
                    });
                    currentCall = call;
                } catch (err) {
                    alert('خطا: ' + err.message);
                }
            });

            // ===== پایان تماس =====
            endCallBtn.addEventListener('click', () => {
                if (currentCall) {
                    currentCall.close();
                    currentCall = null;
                    remoteVideo.srcObject = null;
                    callStatusText.textContent = '⏹ تماس قطع شد';
                } else {
                    alert('تماس فعالی نیست');
                }
            });

            // ===== کپی کد =====
            copyBtn.addEventListener('click', () => {
                const text = myPeerId || 'کدی وجود ندارد';
                navigator.clipboard.writeText(text).then(() => {
                    alert('کد کپی شد: ' + text);
                }).catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    alert('کد کپی شد: ' + text);
                });
            });

            // ===== خروج =====
            leaveBtn.addEventListener('click', () => {
                if (currentCall) { currentCall.close();
                    currentCall = null; }
                if (localStream) { localStream.getTracks().forEach(t => t.stop());
                    localStream = null; }
                if (peer) { peer.destroy();
                    peer = null; }
                remoteVideo.srcObject = null;
                localVideo.srcObject = null;
                callStatusText.textContent = '⏳ منتظر تماس...';
                joinSection.classList.remove('hidden');
                callSection.classList.add('hidden');
            });

        })();
    </script>

</body>
</html>
