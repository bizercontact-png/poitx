<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonLink - پیام‌رسان سایبرپانک</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Vazirmatn:wght@100;200;300;400;500;600;700;800;900&display=swap');

        :root {
            --neon-pink: #ff2d95;
            --neon-blue: #00f0ff;
            --neon-purple: #b400ff;
            --neon-green: #00ff88;
            --neon-yellow: #ffee00;
            --dark-bg: #0a0a0f;
            --darker-bg: #050508;
            --glass-bg: rgba(10, 10, 20, 0.8);
            --glass-border: rgba(0, 240, 255, 0.2);
            --text-primary: #e0e0ff;
            --text-secondary: #8080aa;
            --glow-pink: 0 0 20px rgba(255, 45, 149, 0.5);
            --glow-blue: 0 0 20px rgba(0, 240, 255, 0.5);
            --glow-purple: 0 0 20px rgba(180, 0, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', 'Orbitron', sans-serif;
            background: var(--darker-bg);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* پس‌زمینه متحرک */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(180, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 240, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255, 45, 149, 0.1) 0%, transparent 50%);
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--neon-blue);
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        /* کانتینر اصلی */
        .main-container {
            width: 95vw;
            max-width: 1400px;
            height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            position: relative;
            z-index: 10;
            box-shadow: 
                0 0 40px rgba(0, 240, 255, 0.1),
                0 0 80px rgba(180, 0, 255, 0.05),
                inset 0 0 40px rgba(0, 240, 255, 0.02);
            overflow: hidden;
            animation: containerGlow 4s ease-in-out infinite;
        }

        @keyframes containerGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(0, 240, 255, 0.1), 0 0 80px rgba(180, 0, 255, 0.05); }
            50% { box-shadow: 0 0 60px rgba(0, 240, 255, 0.2), 0 0 100px rgba(180, 0, 255, 0.1); }
        }

        /* نوار کناری */
        .sidebar {
            width: 80px;
            background: rgba(5, 5, 10, 0.9);
            border-left: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 30px;
            z-index: 20;
        }

        .sidebar-icon {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            font-size: 20px;
            color: var(--text-secondary);
        }

        .sidebar-icon:hover {
            border-color: var(--neon-blue);
            box-shadow: var(--glow-blue);
            color: var(--neon-blue);
            transform: translateY(-2px);
        }

        .sidebar-icon.active {
            border-color: var(--neon-pink);
            box-shadow: var(--glow-pink);
            color: var(--neon-pink);
            background: rgba(255, 45, 149, 0.1);
        }

        .sidebar-icon .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            background: var(--neon-pink);
            border-radius: 50%;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            box-shadow: var(--glow-pink);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* پنل چت */
        .chat-panel {
            width: 350px;
            background: rgba(5, 5, 10, 0.7);
            border-left: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            z-index: 15;
        }

        .search-container {
            padding: 20px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            color: var(--text-primary);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            padding-left: 40px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: var(--glow-blue);
        }

        .search-icon {
            position: absolute;
            right: 35px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 18px;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px;
        }

        .contact-list::-webkit-scrollbar {
            width: 5px;
        }

        .contact-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .contact-list::-webkit-scrollbar-thumb {
            background: var(--neon-purple);
            border-radius: 10px;
        }

        .contact-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 15px;
            background: var(--glass-bg);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .contact-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(0, 240, 255, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .contact-item:hover::before {
            transform: translateX(100%);
        }

        .contact-item:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
            transform: translateX(-5px);
        }

        .contact-item.active {
            border-color: var(--neon-pink);
            box-shadow: var(--glow-pink);
            background: rgba(255, 45, 149, 0.1);
        }

        .contact-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: white;
            position: relative;
            flex-shrink: 0;
        }

        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--neon-green);
            border-radius: 50%;
            border: 2px solid var(--dark-bg);
            box-shadow: 0 0 10px var(--neon-green);
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 5px;
            color: var(--text-primary);
        }

        .contact-last-message {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-time {
            font-size: 10px;
            color: var(--neon-blue);
            font-family: 'Orbitron', monospace;
        }

        /* منطقه اصلی چت */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.3);
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(5, 5, 10, 0.5);
        }

        .chat-header-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .chat-header-info h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .chat-header-info .status {
            font-size: 12px;
            color: var(--neon-green);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-green);
            animation: pulse 2s infinite;
        }

        .chat-header-actions {
            margin-right: auto;
            display: flex;
            gap: 15px;
        }

        .header-action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-secondary);
            font-size: 18px;
        }

        .header-action-btn:hover {
            border-color: var(--neon-blue);
            box-shadow: var(--glow-blue);
            color: var(--neon-blue);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .messages-container::-webkit-scrollbar {
            width: 5px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--neon-purple);
            border-radius: 10px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 70%;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-content {
            padding: 15px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.sent .message-content {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(180, 0, 255, 0.2));
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-bottom-right-radius: 5px;
        }

        .message.received .message-content {
            background: rgba(255, 45, 149, 0.1);
            border: 1px solid rgba(255, 45, 149, 0.3);
            border-bottom-left-radius: 5px;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 5px;
            font-family: 'Orbitron', monospace;
        }

        .message-input-area {
            padding: 20px 30px;
            border-top: 1px solid var(--glass-border);
            background: rgba(5, 5, 10, 0.5);
        }

        .input-container {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .message-input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: var(--text-primary);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            resize: none;
        }

        .message-input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: var(--glow-blue);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 20px;
            color: white;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .send-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: sendGlow 2s infinite;
        }

        @keyframes sendGlow {
            0% { transform: rotate(45deg) translateX(-100%); }
            100% { transform: rotate(45deg) translateX(100%); }
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* انیمیشن تایپ */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px;
            align-self: flex-start;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--neon-blue);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* افکت‌های ویژه */
        .glitch-text {
            position: relative;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        /* رسپانسیو */
        @media (max-width: 768px) {
            .main-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 60px;
                flex-direction: row;
                padding: 0 20px;
                gap: 20px;
                border-left: none;
                border-bottom: 1px solid var(--glass-border);
            }

            .sidebar-icon {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .chat-panel {
                width: 100%;
                flex: 1;
            }

            .chat-area {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>

    <div class="main-container">
        <!-- نوار کناری -->
        <div class="sidebar">
            <div class="sidebar-icon active" title="چت‌ها">💬</div>
            <div class="sidebar-icon" title="تماس‌ها">📞</div>
            <div class="sidebar-icon" title="گروه‌ها">👥</div>
            <div class="sidebar-icon" title="تنظیمات">⚙️
                <span class="badge">3</span>
            </div>
            <div class="sidebar-icon" title="پروفایل">👤</div>
        </div>

        <!-- پنل مخاطبین -->
        <div class="chat-panel">
            <div class="search-container">
                <input type="text" class="search-input" placeholder="جستجوی مخاطب...">
                <span class="search-icon">🔍</span>
            </div>
            <div class="contact-list" id="contactList">
                <!-- مخاطبین به صورت داینامیک اضافه می‌شوند -->
            </div>
        </div>

        <!-- منطقه چت -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-header-avatar">س</div>
                <div class="chat-header-info">
                    <h3 class="glitch-text">سارا</h3>
                    <div class="status">
                        <span class="status-dot"></span>
                        آنلاین
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button class="header-action-btn" title="تماس صوتی">🎙️</button>
                    <button class="header-action-btn" title="تماس تصویری">📹</button>
                    <button class="header-action-btn" title="اطلاعات">ℹ️</button>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <!-- پیام‌ها به صورت داینامیک اضافه می‌شوند -->
            </div>

            <div class="message-input-area">
                <div class="input-container">
                    <button class="header-action-btn" title="Emoji">😊</button>
                    <button class="header-action-btn" title="Attachment">📎</button>
                    <input type="text" class="message-input" id="messageInput" placeholder="پیام خود را بنویسید..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // داده‌های اولیه
        const contacts = [
            { id: 1, name: 'سارا', lastMessage: 'فردا میای استودیو؟', time: '10:30', online: true, unread: 2 },
            { id: 2, name: 'علی', lastMessage: 'پروژه تموم شد', time: '09:15', online: true, unread: 0 },
            { id: 3, name: 'مارینا', lastMessage: 'کد جدید رو دیدی؟', time: 'دیروز', online: false, unread: 5 },
            { id: 4, name: 'تیم طراحی', lastMessage: 'جلسه ساعت ۳', time: 'دیروز', online: true, unread: 0 },
            { id: 5, name: 'کیارش', lastMessage: 'آپدیت جدید اومده', time: 'شنبه', online: false, unread: 1 },
            { id: 6, name: 'نئون گنگ', lastMessage: '🎵 موزیک جدید', time: 'جمعه', online: true, unread: 0 }
        ];

        const messages = [
            { id: 1, text: 'سلام! حالت چطوره؟', sender: 'received', time: '10:15' },
            { id: 2, text: 'سلام! خوبم مرسی. تو چطوری؟', sender: 'sent', time: '10:16' },
            { id: 3, text: 'عالی! فردا میای استودیو؟', sender: 'received', time: '10:18' },
            { id: 4, text: 'حتماً! ساعت چند؟', sender: 'sent', time: '10:20' },
            { id: 5, text: 'ساعت ۲ بعد از ظهر. یه پروژه جدید داریم', sender: 'received', time: '10:22' },
            { id: 6, text: 'چه خوب! مشتاقم ببینمش', sender: 'sent', time: '10:25' },
            { id: 7, text: 'عالیه! پس فردا می‌بینمت 🤘', sender: 'received', time: '10:30' }
        ];

        // ایجاد ذرات متحرک
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 10 + 5) + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(particle);
            }
        }

        // بارگذاری مخاطبین
        function loadContacts() {
            const contactList = document.getElementById('contactList');
            contactList.innerHTML = '';
            
            contacts.forEach(contact => {
                const contactElement = document.createElement('div');
                contactElement.className = 'contact-item' + (contact.id === 1 ? ' active' : '');
                contactElement.innerHTML = `
                    <div class="contact-avatar">
                        ${contact.name.charAt(0)}
                        ${contact.online ? '<span class="online-dot"></span>' : ''}
                    </div>
                    <div class="contact-info">
                        <div class="contact-name">${contact.name}</div>
                        <div class="contact-last-message">${contact.lastMessage}</div>
                    </div>
                    <div style="text-align: left;">
                        <div class="contact-time">${contact.time}</div>
                        ${contact.unread > 0 ? `<div style="background: var(--neon-pink); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 10px; margin-top: 5px; box-shadow: var(--glow-pink);">${contact.unread}</div>` : ''}
                    </div>
                `;
                contactElement.addEventListener('click', () => {
                    document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
                    contactElement.classList.add('active');
                    updateChatHeader(contact);
                });
                contactList.appendChild(contactElement);
            });
        }

        // بارگذاری پیام‌ها
        function loadMessages() {
            const messagesContainer = document.getElementById('messagesContainer');
            messagesContainer.innerHTML = '';
            
            messages.forEach(msg => {
                addMessageToContainer(msg, false);
            });
            
            // اسکرول به پایین
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // اضافه کردن پیام به کانتینر
        function addMessageToContainer(msg, animate = true) {
            const messagesContainer = document.getElementById('messagesContainer');
            const messageElement = document.createElement('div');
            messageElement.className = `message ${msg.sender}`;
            if (animate) {
                messageElement.style.animation = 'messageSlide 0.3s ease-out';
            }
            messageElement.innerHTML = `
                <div class="message-content">
                    ${msg.text}
                    <div class="message-time">${msg.time}</div>
                </div>
            `;
            messagesContainer.appendChild(messageElement);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // بروزرسانی هدر چت
        function updateChatHeader(contact) {
            const headerName = document.querySelector('.chat-header-info h3');
            const headerAvatar = document.querySelector('.chat-header-avatar');
            const statusDot = document.querySelector('.status-dot');
            const statusText = document.querySelector('.status');
            
            headerName.textContent = contact.name;
            headerAvatar.textContent = contact.name.charAt(0);
            
            if (contact.online) {
                statusDot.style.display = 'inline-block';
                statusText.innerHTML = '<span class="status-dot"></span> آنلاین';
            } else {
                statusDot.style.display = 'none';
                statusText.innerHTML = 'آفلاین';
            }
        }

        // ارسال پیام
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (text) {
                const now = new Date();
                const time = now.getHours().toString().padStart(2, '0') + ':' + 
                           now.getMinutes().toString().padStart(2, '0');
                
                const newMessage = {
                    id: Date.now(),
                    text: text,
                    sender: 'sent',
                    time: time
                };
                
                messages.push(newMessage);
                addMessageToContainer(newMessage, true);
                input.value = '';
                
                // شبیه‌سازی پاسخ خودکار
                setTimeout(() => {
                    simulateReply();
                }, 1000 + Math.random() * 2000);
            }
        }

        // شبیه‌سازی پاسخ
        function simulateReply() {
            const replies = [
                'آره موافقم! 🤘',
                'جالب بود، بیشتر توضیح بده',
                'باشه، چشم 👌',
                'فردا حتماً خبر بده',
                '👍',
                '😂 آره دقیقاً',
                'باشه، می‌بینمت',
                'مرسی از اطلاع‌رسانی'
            ];
            
            const randomReply = replies[Math.floor(Math.random() * replies.length)];
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ':' + 
                       now.getMinutes().toString().padStart(2, '0');
            
            // نمایش indicator تایپ
            const messagesContainer = document.getElementById('messagesContainer');
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'typing-indicator';
            typingIndicator.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            typingIndicator.id = 'typingIndicator';
            messagesContainer.appendChild(typingIndicator);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // حذف indicator و اضافه کردن پیام
            setTimeout(() => {
                const indicator = document.getElementById('typingIndicator');
                if (indicator) {
                    indicator.remove();
                }
                
                const replyMessage = {
                    id: Date.now(),
                    text: randomReply,
                    sender: 'received',
                    time: time
                };
                
                messages.push(replyMessage);
                addMessageToContainer(replyMessage, true);
            }, 2000);
        }

        // هندل کردن Enter
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // کلیک روی آیکون‌های سایدبار
        document.querySelectorAll('.sidebar-icon').forEach(icon => {
            icon.addEventListener('click', function() {
                document.querySelectorAll('.sidebar-icon').forEach(el => el.classList.remove('active'));
                this.classList.add('active');
                
                // افکت کلیک
                this.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 150);
            });
        });

        // راه‌اندازی
        createParticles();
        loadContacts();
        loadMessages();

        // فوکوس روی input
        document.getElementById('messageInput').focus();
    </script>
</body>
</html>
