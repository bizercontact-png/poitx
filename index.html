<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberStream Live Room - Engine v4.0</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Vazirmatn:wght@100;200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-pink: #ff2d95;
            --neon-blue: #00f0ff;
            --neon-purple: #b400ff;
            --neon-green: #00ff88;
            --neon-red: #ff1744;
            --neon-yellow: #ffee00;
            
            --bg-void: #030308;
            --bg-abyss: #060613;
            --bg-deep: #0a0a1f;
            --bg-surface: #0f0f2a;
            --bg-elevated: #151538;
            
            --glass-subtle: rgba(12, 12, 30, 0.5);
            --glass-medium: rgba(10, 10, 25, 0.75);
            --glass-heavy: rgba(6, 6, 18, 0.95);
            
            --border-ghost: rgba(0, 240, 255, 0.05);
            --border-hairline: rgba(0, 240, 255, 0.1);
            --border-default: rgba(0, 240, 255, 0.2);
            --border-emphasis: rgba(0, 240, 255, 0.35);
            --border-glow: rgba(0, 240, 255, 0.6);
            
            --text-primary: #ececff;
            --text-secondary: #b8b8e0;
            --text-tertiary: #8080b8;
            --text-muted: #585890;
            
            --glow-blue-sm: 0 0 10px rgba(0, 240, 255, 0.3);
            --glow-blue-md: 0 0 25px rgba(0, 240, 255, 0.45);
            --glow-blue-lg: 0 0 50px rgba(0, 240, 255, 0.6);
            --glow-red-pulse: 0 0 20px rgba(255, 23, 68, 0.5);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 28px;
            --radius-full: 9999px;
            
            --font-body: 'Vazirmatn', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-display: 'Orbitron', sans-serif;
            
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg-void);
            color: var(--text-primary);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Background */
        .bg-engine {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-gradient {
            position: absolute;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(0, 240, 255, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(180, 0, 255, 0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 45, 149, 0.03) 0%, transparent 60%);
        }

        .bg-grid {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridDrift 20s linear infinite;
        }

        @keyframes gridDrift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .particles-layer {
            position: absolute;
            width: 100%; height: 100%;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--neon-blue);
            box-shadow: 0 0 6px var(--neon-blue);
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            85% { opacity: 0.4; }
            100% { transform: translateY(-5vh) scale(1.5); opacity: 0; }
        }

        /* Toast */
        .toast-hub {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }

        .toast {
            padding: 12px 24px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-emphasis);
            border-radius: var(--radius-full);
            animation: toastIn 0.4s var(--ease-out-back);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        @keyframes toastIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* ============ JOIN SCREEN ============ */
        .join-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: rgba(5, 5, 18, 0.95);
            backdrop-filter: blur(30px);
            transition: all 0.5s var(--ease-out-expo);
        }

        .join-screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }

        .join-card {
            width: 460px;
            padding: 40px;
            background: var(--glass-medium);
            border: 1px solid var(--border-emphasis);
            border-radius: var(--radius-2xl);
            box-shadow: var(--glow-blue-md);
            animation: cardGlow 3s ease-in-out infinite;
        }

        @keyframes cardGlow {
            0%, 100% { box-shadow: var(--glow-blue-md); }
            50% { box-shadow: var(--glow-blue-lg); }
        }

        .logo {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 0.8rem;
            margin-bottom: 30px;
            font-family: var(--font-mono);
        }

        .tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 24px;
            background: rgba(0,0,0,0.3);
            border-radius: var(--radius-lg);
            padding: 3px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            color: var(--text-tertiary);
        }

        .tab.active {
            background: rgba(0, 240, 255, 0.12);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: var(--glow-blue-sm);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
        }

        .invite-box {
            background: rgba(0,0,0,0.5);
            border: 2px dashed var(--border-glow);
            border-radius: var(--radius-xl);
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }

        .invite-code {
            font-family: var(--font-mono);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--neon-purple);
            letter-spacing: 10px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-lg);
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s var(--ease-out-back);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: white;
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(0, 240, 255, 0.5);
        }

        .btn-copy {
            background: rgba(180,0,255,0.15);
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 8px 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        /* ============ STREAM ROOM ============ */
        .stream-room {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s var(--ease-out-expo);
        }

        .stream-room.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Broadcast Area */
        .broadcast-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-deep);
            border-right: 1px solid var(--border-ghost);
            min-width: 0;
        }

        .broadcast-header {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: var(--glass-heavy);
            border-bottom: 1px solid var(--border-hairline);
            backdrop-filter: blur(20px);
        }

        .streamer-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            border: 2px solid var(--border-glow);
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            background: rgba(255,23,68,0.15);
            border: 1px solid var(--neon-red);
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            color: var(--neon-red);
            font-weight: 700;
            animation: livePulse 2s infinite;
        }

        @keyframes livePulse {
            0%,100% { box-shadow: 0 0 8px rgba(255,23,68,0.3); }
            50% { box-shadow: 0 0 20px rgba(255,23,68,0.6); }
        }

        .live-dot {
            width: 7px; height: 7px;
            background: var(--neon-red);
            border-radius: 50%;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .room-id {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-tertiary);
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: var(--radius-full);
            border: 1px solid var(--border-hairline);
        }

        .controls {
            display: flex;
            gap: 6px;
        }

        .ctrl-btn {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: var(--glass-subtle);
            border: 1px solid var(--border-default);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .ctrl-btn:hover {
            border-color: var(--border-glow);
            color: var(--neon-blue);
            box-shadow: var(--glow-blue-sm);
        }

        .ctrl-btn.active {
            background: rgba(0,255,136,0.15);
            border-color: var(--neon-green);
            color: var(--neon-green);
        }

        .ctrl-btn.muted {
            background: rgba(255,23,68,0.15);
            border-color: var(--neon-red);
            color: var(--neon-red);
        }

        .ctrl-btn.danger {
            border-color: rgba(255,23,68,0.3);
            color: var(--neon-red);
        }

        /* Video Grid */
        .video-grid {
            flex: 1;
            display: grid;
            gap: 8px;
            padding: 10px;
            background: #000;
            position: relative;
        }

        .video-grid.single {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }

        .video-grid.pip {
            grid-template-columns: 1fr 200px;
            grid-template-rows: 1fr 150px;
        }

        .video-panel {
            position: relative;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: #111;
            border: 1px solid var(--border-hairline);
        }

        .video-panel.main {
            grid-column: 1;
            grid-row: 1 / -1;
        }

        .video-panel.inset {
            grid-column: 2;
            grid-row: 2;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .placeholder {
            grid-column: 1 / -1;
            grid-row: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .placeholder .icon {
            font-size: 5rem;
            opacity: 0.2;
            margin-bottom: 16px;
        }

        .timer {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 6px 14px;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--neon-red);
            border-radius: var(--radius-full);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--neon-red);
            z-index: 20;
        }

        /* Chat Sidebar */
        .chat-sidebar {
            width: 340px;
            display: flex;
            flex-direction: column;
            background: var(--bg-surface);
        }

        .chat-header {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: var(--glass-heavy);
            border-bottom: 1px solid var(--border-hairline);
            backdrop-filter: blur(20px);
        }

        .chat-title {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .viewer-count {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--neon-green);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .messages::-webkit-scrollbar {
            width: 3px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border-default);
            border-radius: 10px;
        }

        .msg {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2px;
        }

        .msg-user {
            font-weight: 700;
            font-size: 0.8rem;
        }

        .msg-user.host { color: var(--neon-blue); }
        .msg-user.guest { color: var(--neon-pink); }

        .msg-badge {
            font-size: 0.6rem;
            padding: 1px 5px;
            border-radius: 4px;
            background: rgba(0,240,255,0.15);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
        }

        .msg-time {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-right: auto;
        }

        .msg-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            padding-right: 20px;
            line-height: 1.5;
        }

        .sys-msg {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-tertiary);
            padding: 6px;
            font-style: italic;
        }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid var(--border-hairline);
            background: var(--glass-heavy);
        }

        .input-row {
            display: flex;
            gap: 6px;
        }

        .chat-input {
            flex: 1;
            padding: 11px 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-full);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.8rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .chat-input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 12px rgba(0,240,255,0.1);
        }

        .send-btn {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            border: none;
            cursor: pointer;
            color: white;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            box-shadow: 0 3px 15px rgba(0,240,255,0.3);
        }

        .send-btn:hover {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .stream-room { flex-direction: column; }
            .broadcast-area { height: 55%; border-right: none; border-bottom: 1px solid var(--border-ghost); }
            .chat-sidebar { width: 100%; flex: 1; }
            .join-card { width: 92vw; padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-engine">
        <div class="bg-gradient"></div>
        <div class="bg-grid"></div>
        <div class="particles-layer" id="particles"></div>
    </div>

    <div class="toast-hub" id="toasts"></div>

    <!-- JOIN SCREEN -->
    <div class="join-screen" id="joinScreen">
        <div class="join-card">
            <div class="logo">CYBERSTREAM</div>
            <div class="subtitle">Live Room Engine v4.0</div>
            
            <div class="tabs">
                <div class="tab active" id="tabCreate" onclick="switchTab('create')">🎥 ایجاد اتاق</div>
                <div class="tab" id="tabJoin" onclick="switchTab('join')">🔗 ورود به اتاق</div>
            </div>

            <div id="createForm">
                <div class="form-group">
                    <label class="form-label">نام شما (میزبان)</label>
                    <input type="text" class="form-input" id="hostName" value="ابوالفضل">
                </div>
                <button class="btn btn-primary" onclick="createRoom()">🚀 ایجاد اتاق لایو</button>
                
                <div class="invite-box" id="inviteBox" style="display:none;">
                    <label class="form-label">کد دعوت</label>
                    <div class="invite-code" id="inviteCode">------</div>
                    <button class="btn-copy" onclick="copyCode()">📋 کپی کد</button>
                    <br>
                    <button class="btn btn-primary" style="margin-top:12px;" onclick="enterRoom()">🎬 ورود به اتاق</button>
                </div>
            </div>

            <div id="joinForm" style="display:none;">
                <div class="form-group">
                    <label class="form-label">نام شما (مهمان)</label>
                    <input type="text" class="form-input" id="guestName" value="مهدیار">
                </div>
                <div class="form-group">
                    <label class="form-label">کد دعوت</label>
                    <input type="text" class="form-input" id="inviteInput" placeholder="کد ۶ رقمی">
                </div>
                <button class="btn btn-primary" onclick="joinRoom()">🔗 پیوستن به اتاق</button>
            </div>
        </div>
    </div>

    <!-- STREAM ROOM -->
    <div class="stream-room" id="streamRoom">
        <div class="broadcast-area">
            <div class="broadcast-header">
                <div class="streamer-info">
                    <div class="avatar" id="roomAvatar">ا</div>
                    <div>
                        <div style="font-weight:700;" id="roomHostName">ابوالفضل</div>
                        <span class="live-badge" id="liveBadge" style="display:none;">
                            <span class="live-dot"></span> LIVE
                        </span>
                    </div>
                </div>
                <span class="room-id" id="roomCode">Room: ------</span>
                <div class="controls">
                    <button class="ctrl-btn" id="micBtn" onclick="toggleMic()">🎙️</button>
                    <button class="ctrl-btn" id="camBtn" onclick="toggleCam()">📹</button>
                    <button class="ctrl-btn" id="screenBtn" onclick="toggleScreen()">🖥️</button>
                    <button class="ctrl-btn danger" onclick="leaveRoom()">🚪</button>
                </div>
            </div>

            <div class="video-grid single" id="videoGrid">
                <video id="mainVideo" autoplay muted playsinline></video>
                <video id="pipVideo" autoplay muted playsinline style="display:none;"></video>
                <div class="placeholder" id="placeholder">
                    <div class="icon">📡</div>
                    <h3>در انتظار دوربین...</h3>
                    <p>دکمه 📹 را بزنید</p>
                </div>
                <div class="timer" id="timer" style="display:none;">
                    🔴 <span id="timerValue">00:00:00</span>
                </div>
            </div>
        </div>

        <div class="chat-sidebar">
            <div class="chat-header">
                <span class="chat-title">💬 گفتگوی زنده</span>
                <span class="viewer-count" id="viewerCount">🟢 1 نفر</span>
            </div>
            <div class="messages" id="messages"></div>
            <div class="chat-input-area">
                <div class="input-row">
                    <input type="text" class="chat-input" id="chatInput" placeholder="پیام بده..." onkeypress="if(event.key==='Enter'){event.preventDefault();sendMsg();}">
                    <button class="send-btn" onclick="sendMsg()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ CYBERSTREAM LIVE ROOM ENGINE ============
        class LiveRoom {
            constructor() {
                this.roomCode = null;
                this.role = null; // 'host' | 'guest'
                this.myName = null;
                this.peerName = null;
                this.camStream = null;
                this.screenStream = null;
                this.camActive = false;
                this.micActive = true;
                this.screenActive = false;
                this.timerInterval = null;
                this.timerStart = null;
                this.messages = [];
                
                this.initParticles();
            }

            initParticles() {
                const c = document.getElementById('particles');
                const colors = ['#00f0ff','#b400ff','#ff2d95','#00ff88'];
                for(let i=0;i<35;i++){
                    const p=document.createElement('div');
                    p.className='particle';
                    p.style.left=Math.random()*100+'%';
                    p.style.animationDuration=(Math.random()*10+8)+'s';
                    p.style.animationDelay=Math.random()*10+'s';
                    p.style.width=(Math.random()*3+1)+'px';
                    p.style.height=p.style.width;
                    p.style.background=colors[Math.floor(Math.random()*colors.length)];
                    c.appendChild(p);
                }
            }

            // ============ ROOM ============
            create() {
                const name = document.getElementById('hostName').value.trim();
                if(!name) return this.toast('⚠️ نام را وارد کنید');
                
                this.roomCode = String(Math.floor(100000+Math.random()*900000));
                this.role = 'host';
                this.myName = name;
                this.peerName = 'مهمان';
                
                localStorage.setItem(`room_${this.roomCode}`, JSON.stringify({
                    code: this.roomCode,
                    host: name,
                    live: false,
                    createdAt: Date.now(),
                    messages: []
                }));
                
                document.getElementById('inviteCode').textContent = this.roomCode;
                document.getElementById('inviteBox').style.display = 'block';
                document.getElementById('hostName').disabled = true;
                this.toast('✅ اتاق ساخته شد');
            }

            enter() {
                this.activateUI();
                this.updateHeader();
                this.sysMsg(`🚀 ${this.myName} وارد اتاق شد`);
                this.sysMsg(`🔑 کد: ${this.roomCode}`);
                this.updateViewers(1);
                this.updateRoomData({ live: true });
                
                // فعال‌سازی خودکار دوربین
                setTimeout(() => this.startCamera(), 600);
                
                // شبیه‌سازی ورود مهمان
                setTimeout(() => this.simulateGuest(), 2000);
            }

            join() {
                const name = document.getElementById('guestName').value.trim();
                const code = document.getElementById('inviteInput').value.trim();
                
                if(!name || !code) return this.toast('⚠️ همه فیلدها را پر کنید');
                
                const data = JSON.parse(localStorage.getItem(`room_${code}`));
                if(!data) return this.toast('❌ کد نامعتبر');
                
                this.roomCode = code;
                this.role = 'guest';
                this.myName = name;
                this.peerName = data.host;
                
                this.activateUI();
                this.updateHeader();
                this.sysMsg(`👋 ${name} به اتاق پیوست`);
                this.updateViewers(2);
                
                // بارگذاری پیام‌های قبلی
                if(data.messages) data.messages.forEach(m => this.renderMsg(m));
                
                // فعال‌سازی دوربین
                setTimeout(() => this.startCamera(), 600);
                
                document.getElementById('screenBtn').style.display = 'none';
                this.toast('✅ وارد اتاق شدید');
            }

            leave() {
                this.stopAllMedia();
                this.sysMsg(`👋 ${this.myName} از اتاق خارج شد`);
                if(this.role==='host') this.updateRoomData({ live: false });
                
                document.getElementById('joinScreen').classList.remove('hidden');
                document.getElementById('streamRoom').classList.remove('active');
                document.getElementById('hostName').disabled = false;
                document.getElementById('inviteBox').style.display = 'none';
                document.getElementById('messages').innerHTML = '';
                document.getElementById('mainVideo').srcObject = null;
                document.getElementById('pipVideo').srcObject = null;
                document.getElementById('mainVideo').style.display = 'none';
                document.getElementById('pipVideo').style.display = 'none';
                document.getElementById('placeholder').style.display = 'flex';
                document.getElementById('videoGrid').className = 'video-grid single';
                document.getElementById('timer').style.display = 'none';
                this.stopTimer();
                this.resetState();
            }

            // ============ MEDIA ============
            async startCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { width: 1280, height: 720 },
                        audio: true
                    });
                    
                    this.camStream = stream;
                    this.camActive = true;
                    this.micActive = true;
                    
                    const main = document.getElementById('mainVideo');
                    main.srcObject = stream;
                    main.style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                    
                    document.getElementById('camBtn').classList.add('active');
                    document.getElementById('micBtn').classList.add('active');
                    this.startTimer();
                    this.sysMsg('📹 دوربین فعال شد');
                } catch(e) {
                    this.toast('⚠️ دسترسی به دوربین ممکن نیست');
                }
            }

            toggleMic() {
                if(!this.camStream) return;
                const track = this.camStream.getAudioTracks()[0];
                if(!track) return;
                
                this.micActive = !this.micActive;
                track.enabled = this.micActive;
                
                const btn = document.getElementById('micBtn');
                if(this.micActive) {
                    btn.classList.add('active'); btn.classList.remove('muted');
                    this.sysMsg('🎙️ میکروفون روشن');
                } else {
                    btn.classList.add('muted'); btn.classList.remove('active');
                    this.sysMsg('🔇 میکروفون خاموش');
                }
            }

            toggleCam() {
                if(!this.camStream) { this.startCamera(); return; }
                
                const track = this.camStream.getVideoTracks()[0];
                if(!track) return;
                
                this.camActive = !this.camActive;
                track.enabled = this.camActive;
                
                const btn = document.getElementById('camBtn');
                if(this.camActive) {
                    btn.classList.add('active');
                    this.sysMsg('📹 دوربین روشن');
                } else {
                    btn.classList.remove('active');
                    this.sysMsg('📷 دوربین خاموش');
                }
            }

            async toggleScreen() {
                if(this.role !== 'host') return;
                
                if(this.screenActive) { this.stopScreen(); return; }
                
                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({
                        video: { cursor: 'always' },
                        audio: true
                    });
                    
                    this.screenStream = stream;
                    this.screenActive = true;
                    
                    const main = document.getElementById('mainVideo');
                    const pip = document.getElementById('pipVideo');
                    
                    main.srcObject = stream;
                    
                    if(this.camStream) {
                        pip.srcObject = this.camStream;
                        pip.style.display = 'block';
                        document.getElementById('videoGrid').className = 'video-grid pip';
                    }
                    
                    document.getElementById('screenBtn').classList.add('active');
                    document.getElementById('placeholder').style.display = 'none';
                    this.sysMsg('🖥️ میزبان صفحه را به اشتراک گذاشت');
                    
                    stream.getVideoTracks()[0].addEventListener('ended', () => this.stopScreen());
                } catch(e) {
                    this.toast('⚠️ اشتراک صفحه ممکن نشد');
                }
            }

            stopScreen() {
                if(this.screenStream) {
                    this.screenStream.getTracks().forEach(t => t.stop());
                    this.screenStream = null;
                }
                this.screenActive = false;
                
                const main = document.getElementById('mainVideo');
                const pip = document.getElementById('pipVideo');
                
                if(this.camStream) main.srcObject = this.camStream;
                pip.srcObject = null;
                pip.style.display = 'none';
                document.getElementById('videoGrid').className = 'video-grid single';
                document.getElementById('screenBtn').classList.remove('active');
                this.sysMsg('⏹️ اشتراک صفحه پایان یافت');
            }

            stopAllMedia() {
                [this.camStream, this.screenStream].forEach(s => {
                    if(s) s.getTracks().forEach(t => t.stop());
                });
                this.camStream = null;
                this.screenStream = null;
                this.camActive = false;
                this.screenActive = false;
                this.stopTimer();
            }

            // ============ CHAT ============
            send() {
                const input = document.getElementById('chatInput');
                const text = input.value.trim();
                if(!text) return;
                
                const msg = {
                    author: this.myName,
                    role: this.role,
                    text,
                    time: Date.now()
                };
                
                this.messages.push(msg);
                this.renderMsg(msg);
                this.saveMessages();
                input.value = '';
                input.focus();
                
                this.autoReply(text);
            }

            renderMsg(msg) {
                const container = document.getElementById('messages');
                const time = new Date(msg.time).toLocaleTimeString('fa-IR', { hour:'2-digit', minute:'2-digit' });
                
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `
                    <div class="msg-header">
                        <span class="msg-user ${msg.role}">${this.esc(msg.author)}</span>
                        <span class="msg-badge">${msg.role==='host'?'HOST':'GUEST'}</span>
                        <span class="msg-time">${time}</span>
                    </div>
                    <div class="msg-text">${this.esc(msg.text)}</div>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }

            sysMsg(text) {
                const container = document.getElementById('messages');
                const div = document.createElement('div');
                div.className = 'sys-msg';
                div.textContent = text;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }

            autoReply(to) {
                const delay = 1000 + Math.random() * 2500;
                setTimeout(() => {
                    const responses = this.smartReply(to);
                    const msg = {
                        author: this.peerName,
                        role: this.role==='host'?'guest':'host',
                        text: responses,
                        time: Date.now()
                    };
                    this.messages.push(msg);
                    this.renderMsg(msg);
                    this.saveMessages();
                }, delay);
            }

            smartReply(msg) {
                const m = msg.toLowerCase();
                if(m.includes('سلام') || m.includes('خوبی')) 
                    return ['سلام! 🙌','هی! خوبم 😊','سلاممم ✨'][Math.floor(Math.random()*3)];
                if(m.includes('کد') || m.includes('برنامه'))
                    return ['کدت عالیه 👨‍💻','معماریش حرفه‌ایه 💪'][Math.floor(Math.random()*2)];
                return ['درسته 👍','باحاله 😎','ادامه بده 🚀','متوجه شدم 👌','حرفه‌ای 🔥'][Math.floor(Math.random()*5)];
            }

            simulateGuest() {
                this.peerName = 'مهدیار';
                this.updateViewers(2);
                this.sysMsg('👋 مهدیار به اتاق پیوست');
                
                setTimeout(() => {
                    const msg = {
                        author: 'مهدیار',
                        role: 'guest',
                        text: `سلام ${this.myName}! لایو عالیه 🎉`,
                        time: Date.now()
                    };
                    this.messages.push(msg);
                    this.renderMsg(msg);
                    this.saveMessages();
                }, 1200);
            }

            // ============ UI ============
            activateUI() {
                document.getElementById('joinScreen').classList.add('hidden');
                document.getElementById('streamRoom').classList.add('active');
            }

            updateHeader() {
                const displayName = this.role==='host' ? this.myName : this.peerName;
                document.getElementById('roomHostName').textContent = displayName;
                document.getElementById('roomAvatar').textContent = displayName.charAt(0);
                document.getElementById('roomCode').textContent = `Room: ${this.roomCode}`;
                document.getElementById('liveBadge').style.display = 'inline-flex';
            }

            updateViewers(n) {
                document.getElementById('viewerCount').textContent = `🟢 ${n} نفر`;
            }

            startTimer() {
                this.timerStart = Date.now();
                document.getElementById('timer').style.display = 'block';
                
                this.timerInterval = setInterval(() => {
                    const el = Math.floor((Date.now() - this.timerStart) / 1000);
                    const h = String(Math.floor(el/3600)).padStart(2,'0');
                    const m = String(Math.floor((el%3600)/60)).padStart(2,'0');
                    const s = String(el%60).padStart(2,'0');
                    document.getElementById('timerValue').textContent = `${h}:${m}:${s}`;
                }, 1000);
            }

            stopTimer() {
                if(this.timerInterval) { clearInterval(this.timerInterval); this.timerInterval = null; }
                document.getElementById('timer').style.display = 'none';
            }

            // ============ DATA ============
            updateRoomData(updates) {
                const data = JSON.parse(localStorage.getItem(`room_${this.roomCode}`));
                if(data) {
                    Object.assign(data, updates);
                    localStorage.setItem(`room_${this.roomCode}`, JSON.stringify(data));
                }
            }

            saveMessages() {
                this.updateRoomData({ messages: this.messages });
            }

            resetState() {
                this.stopAllMedia();
                this.roomCode = null;
                this.role = null;
                this.myName = null;
                this.peerName = null;
                this.messages = [];
                this.timerStart = null;
            }

            // ============ UTILS ============
            toast(msg) {
                const hub = document.getElementById('toasts');
                const t = document.createElement('div');
                t.className = 'toast';
                t.textContent = msg;
                hub.appendChild(t);
                setTimeout(() => { t.style.opacity='0'; t.style.transition='0.3s'; setTimeout(() => t.remove(),300); }, 3000);
            }

            esc(s) {
                const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
                return s.replace(/[&<>"']/g, m => map[m]);
            }
        }

        const room = new LiveRoom();

        // ============ GLOBAL ============
        function switchTab(t) {
            document.getElementById('tabCreate').classList.toggle('active', t==='create');
            document.getElementById('tabJoin').classList.toggle('active', t==='join');
            document.getElementById('createForm').style.display = t==='create'?'block':'none';
            document.getElementById('joinForm').style.display = t==='join'?'block':'none';
        }

        function createRoom() { room.create(); }
        function enterRoom() { room.enter(); }
        function joinRoom() { room.join(); }
        function leaveRoom() { room.leave(); }
        function sendMsg() { room.send(); }
        function toggleMic() { room.toggleMic(); }
        function toggleCam() { room.toggleCam(); }
        function toggleScreen() { room.toggleScreen(); }
        
        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('inviteCode').textContent)
                .then(() => room.toast('📋 کپی شد'));
        }
    </script>
</body>
</html>
