<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتاق شبیه‌سازی POITX</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.05);
            letter-spacing: 1px;
        }
        #poitx-logo {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #00f0ff;
            font-weight: 700;
            font-size: 18px;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            background: rgba(0,0,0,0.6);
            padding: 6px 16px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            letter-spacing: 2px;
            z-index: 10;
            pointer-events: none;
            font-family: 'Courier New', monospace;
        }
        #poitx-logo span { color: #ff2d95; }
    </style>
</head>
<body>
    <div id="poitx-logo">POIT<span>X</span> LAB</div>
    <div id="info">🖱️ کلیک و بکشید تا دور اتاق بچرخید | اسکرول کنید تا زوم کنید</div>

    <!-- بارگذاری Three.js و کتابخانه‌های کمکی از CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ============================================================
        //  1. IMPORT
        // ============================================================
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ============================================================
        //  2. SCENE SETUP
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a); // تاریکی سایبری

        // ============================================================
        //  3. CAMERA
        // ============================================================
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 4, 8);
        camera.lookAt(0, 0, 0);

        // ============================================================
        //  4. RENDERERS
        // ============================================================
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ============================================================
        //  5. CONTROLS
        // ============================================================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = true;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.target.set(0, 1, 0);

        // ============================================================
        //  6. LIGHTS
        // ============================================================
        // نور محیطی نرم
        const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
        scene.add(ambientLight);

        // نور اصلی (سقفی) با سایه
        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        mainLight.position.set(2, 5, 3);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.bias = -0.001;
        scene.add(mainLight);

        // نور پس‌زمینه آبی (نئون)
        const backLight = new THREE.PointLight(0x00f0ff, 0.8, 15);
        backLight.position.set(-3, 2, -4);
        scene.add(backLight);

        // نقطه نور صورتی (تاکید)
        const accentLight = new THREE.PointLight(0xff2d95, 0.6, 12);
        accentLight.position.set(4, 1, 2);
        scene.add(accentLight);

        // ============================================================
        //  7. FLOOR (کف اتاق)
        // ============================================================
        const floorGeometry = new THREE.PlaneGeometry(10, 10);
        const floorMaterial = new THREE.MeshStandardMaterial({
            color: 0x14141e,
            roughness: 0.6,
            metalness: 0.2,
            transparent: true,
            opacity: 0.95,
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.01;
        floor.receiveShadow = true;
        scene.add(floor);

        // کفپوش گرید (شبکه سایبری)
        const gridHelper = new THREE.GridHelper(10, 20, 0x00f0ff, 0x334466);
        gridHelper.position.y = 0;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.2;
        scene.add(gridHelper);

        // ============================================================
        //  8. WALLS (دیوارها)
        // ============================================================
        function createWall(width, height, depth, color, x, y, z, rx = 0, ry = 0, rz = 0) {
            const geo = new THREE.BoxGeometry(width, height, depth);
            const mat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.7,
                metalness: 0.1,
                transparent: true,
                opacity: 0.85,
                side: THREE.DoubleSide,
            });
            const wall = new THREE.Mesh(geo, mat);
            wall.position.set(x, y, z);
            wall.rotation.set(rx, ry, rz);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            return wall;
        }

        // دیوار پشتی (با پنجره)
        createWall(10, 4, 0.2, 0x1a1a2e, 0, 2, -4.9);
        // دیوار جلویی (باز)
        createWall(10, 4, 0.2, 0x1a1a2e, 0, 2, 4.9);
        // دیوار راست
        createWall(0.2, 4, 10, 0x1a1a2e, 4.9, 2, 0);
        // دیوار چپ
        createWall(0.2, 4, 10, 0x1a1a2e, -4.9, 2, 0);
        // سقف
        createWall(10, 0.2, 10, 0x0a0a1a, 0, 4, 0);

        // ============================================================
        //  9. WINDOW (پنجره با نمای بیرونی)
        // ============================================================
        const windowFrame = new THREE.BoxGeometry(2.5, 1.8, 0.1);
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, metalness: 0.8, roughness: 0.2 });
        const frame = new THREE.Mesh(windowFrame, frameMat);
        frame.position.set(0, 2.2, -4.85);
        scene.add(frame);

        // شیشه پنجره (با نور)
        const glassMat = new THREE.MeshStandardMaterial({
            color: 0x88ccff,
            emissive: 0x224466,
            emissiveIntensity: 0.2,
            transparent: true,
            opacity: 0.3,
            roughness: 0.1,
            metalness: 0.9,
        });
        const glass = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 1.5), glassMat);
        glass.position.set(0, 2.2, -4.8);
        scene.add(glass);

        // نمای بیرون (یک منظره ساده)
        const sceneMat = new THREE.MeshStandardMaterial({
            color: 0x0a0a2a,
            emissive: 0x1a2a4a,
            emissiveIntensity: 0.3,
        });
        const sceneBg = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 1.8), sceneMat);
        sceneBg.position.set(0, 2.2, -4.7);
        scene.add(sceneBg);

        // ============================================================
        //  10. FURNITURE (مبلمان)
        // ============================================================
        // میز مرکزی (شیشه‌ای)
        const tableMat = new THREE.MeshStandardMaterial({
            color: 0x1a1a2e,
            metalness: 0.9,
            roughness: 0.1,
            transparent: true,
            opacity: 0.7,
        });
        const table = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 1.2), tableMat);
        table.position.set(0, 0.8, 0);
        table.castShadow = true;
        table.receiveShadow = true;
        scene.add(table);

        // پایه‌های میز (نئونی)
        const legMat = new THREE.MeshStandardMaterial({
            color: 0x00f0ff,
            emissive: 0x00f0ff,
            emissiveIntensity: 0.3,
        });
        for (let x of [-0.8, 0.8]) {
            for (let z of [-0.5, 0.5]) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.7, 8), legMat);
                leg.position.set(x, 0.35, z);
                scene.add(leg);
            }
        }

        // صندلی (سمت راست)
        const chairMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.8 });
        const seat = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.1, 0.6), chairMat);
        seat.position.set(1.8, 0.5, 1.2);
        seat.castShadow = true;
        seat.receiveShadow = true;
        scene.add(seat);

        const back = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.05), chairMat);
        back.position.set(1.8, 0.85, 1.5);
        scene.add(back);

        // صندلی دوم (سمت چپ)
        const seat2 = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.1, 0.6), chairMat);
        seat2.position.set(-1.8, 0.5, -1.2);
        seat2.castShadow = true;
        seat2.receiveShadow = true;
        scene.add(seat2);

        const back2 = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.05), chairMat);
        back2.position.set(-1.8, 0.85, -1.5);
        scene.add(back2);

        // فرش (مرکز)
        const rugMat = new THREE.MeshStandardMaterial({
            color: 0x2a1a3e,
            roughness: 0.9,
            emissive: 0x1a0a2a,
            emissiveIntensity: 0.1,
        });
        const rug = new THREE.Mesh(new THREE.CircleGeometry(1.5, 16), rugMat);
        rug.rotation.x = -Math.PI / 2;
        rug.position.set(0, 0.01, 0);
        rug.receiveShadow = true;
        scene.add(rug);

        // ============================================================
        //  11. DECORATIONS (تزئینات نئونی)
        // ============================================================
        // تابلو روی دیوار
        const artMat = new THREE.MeshStandardMaterial({
            color: 0x2a1a4a,
            emissive: 0x4a2a6a,
            emissiveIntensity: 0.2,
        });
        const art = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 0.8), artMat);
        art.position.set(0, 3, -4.7);
        scene.add(art);

        // کره نئونی (سمبل POITX)
        const sphereMat = new THREE.MeshStandardMaterial({
            color: 0x00f0ff,
            emissive: 0x00f0ff,
            emissiveIntensity: 0.3,
            roughness: 0.2,
            metalness: 0.8,
        });
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), sphereMat);
        sphere.position.set(0, 1.2, 0);
        scene.add(sphere);

        // حلقه دور کره
        const ringMat = new THREE.MeshStandardMaterial({
            color: 0xff2d95,
            emissive: 0xff2d95,
            emissiveIntensity: 0.2,
            wireframe: true,
        });
        const ring = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.02, 8, 24), ringMat);
        ring.position.set(0, 1.2, 0);
        ring.rotation.x = Math.PI / 3;
        scene.add(ring);

        // ستون‌های نوری (سمت چپ و راست)
        const pillarMat = new THREE.MeshStandardMaterial({
            color: 0x1a1a2e,
            emissive: 0x334466,
            emissiveIntensity: 0.1,
            metalness: 0.9,
            roughness: 0.1,
        });
        for (let x of [-4, 4]) {
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 3.5, 8), pillarMat);
            pillar.position.set(x, 2, 0);
            scene.add(pillar);
        }

        // ============================================================
        //  12. PARTICLES (ذرات شناور برای جلوه سایبری)
        // ============================================================
        const particleCount = 400;
        const particlesGeo = new THREE.BufferGeometry();
        const particlesPos = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount * 3; i++) {
            particlesPos[i] = (Math.random() - 0.5) * 12;
            if (i % 3 === 1) particlesPos[i] = Math.random() * 4; // ارتفاع محدود
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlesPos, 3));
        const particlesMat = new THREE.PointsMaterial({
            color: 0x00f0ff,
            size: 0.03,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
        });
        const particles = new THREE.Points(particlesGeo, particlesMat);
        particles.position.y = 0.5;
        scene.add(particles);

        // ============================================================
        //  13. ANIMATION LOOP
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);

            // چرخش آرام ذرات
            particles.rotation.y += 0.0005;

            // چرخش کره و حلقه
            sphere.rotation.y += 0.005;
            ring.rotation.y += 0.01;
            ring.rotation.x = Math.PI / 3 + Math.sin(Date.now() * 0.001) * 0.1;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // ============================================================
        //  14. RESIZE
        // ============================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('🚀 اتاق شبیه‌سازی POITX آماده است!');
    </script>
</body>
</html>
