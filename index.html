<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>چت‌روم POITX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0b0b12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .app {
            width: 100%;
            max-width: 420px;
            background: #14141e;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
        }
        .header {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9;
        }
        .header .badge {
            font-size: 10px;
            color: #60a5fa;
            background: rgba(96, 165, 250, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }
        .join-area {
            padding: 20px;
            flex-shrink: 0;
        }
        .join-area input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: #f1f5f9;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            margin-bottom: 10px;
        }
        .join-area input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }
        .join-area .btn-join {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .join-area .btn-join:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.25);
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(255, 255, 255, 0.01);
        }
        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeUp 0.3s ease;
            word-wrap: break-word;
        }
        .msg-self {
            align-self: flex-end;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-other {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.06);
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        .msg .name {
            font-size: 11px;
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 2px;
        }
        .msg-self .name {
            color: rgba(255, 255, 255, 0.7);
        }
        .msg .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
            text-align: left;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .input-area {
            padding: 12px 16px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.01);
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: #f1f5f9;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        .input-area input:focus {
            border-color: #4f46e5;
        }
        .input-area button {
            padding: 12px 20px;
            border: none;
            border-radius: 24px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }
        .input-area button:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3);
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 20px 8px;
            font-size: 12px;
            color: #64748b;
            flex-shrink: 0;
        }
        .status-bar .online {
            color: #34d399;
        }
        .status-bar .offline {
            color: #ef4444;
        }
        .hidden {
            display: none !important;
        }
        .footer {
            text-align: center;
            font-size: 10px;
            color: #334155;
            padding: 8px 0 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            flex-shrink: 0;
        }
        .footer strong {
            color: #a78bfa;
            font-weight: 500;
        }
        .btn-leave {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-leave:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .empty-state {
            color: #475569;
            text-align: center;
            font-size: 14px;
            margin-top: 40px;
            opacity: 0.6;
        }
        .room-info {
            font-size: 11px;
            color: #64748b;
            padding: 0 20px 4px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app" id="app">

        <div class="header">
            <h1>💬 پیام‌رسان</h1>
            <span class="badge">POITX</span>
        </div>

        <div class="status-bar">
            <span id="statusText">🔴 <span class="offline">خارج از گروه</span></span>
            <span id="userCount">👤 ۰ نفر</span>
        </div>

        <!-- ورود -->
        <div id="joinSection" class="join-area">
            <input type="text" id="usernameInput" placeholder="نام شما..." maxlength="20" value="ابوالفضل" />
            <input type="text" id="roomInput" placeholder="نام اتاق (مثلاً: POITX)" value="POITX" />
            <input type="password" id="passwordInput" placeholder="رمز اتاق" value="1234" />
            <button class="btn-join" id="joinBtn">ورود به اتاق</button>
            <div style="font-size:12px; color:#475569; text-align:center; margin-top:10px;">
                با همین نام و رمز، مهدیار هم وارد شود
            </div>
        </div>

        <!-- چت -->
        <div id="chatSection" class="hidden" style="display:flex; flex-direction:column; flex:1;">
            <div class="room-info" id="roomInfoDisplay">اتاق: <span id="roomNameDisplay">-</span></div>
            <div class="messages" id="messagesContainer">
                <div class="empty-state">✨ پیامی ارسال نشده است</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="پیام..." />
                <button id="sendBtn">ارسال</button>
            </div>
            <div style="display:flex; justify-content:center; padding:4px 0 8px; gap:10px;">
                <button class="btn-leave" id="leaveBtn">🚪 خروج</button>
                <button class="btn-leave" id="inviteBtn">📋 کپی لینک</button>
            </div>
            <div class="footer">
                ساخته شده توسط <strong>ابوالفضل</strong>
            </div>
        </div>

    </div>

    <script>
        (function() {

            // ===== عناصر =====
            const joinSection = document.getElementById('joinSection');
            const chatSection = document.getElementById('chatSection');
            const usernameInput = document.getElementById('usernameInput');
            const roomInput = document.getElementById('roomInput');
            const passwordInput = document.getElementById('passwordInput');
            const joinBtn = document.getElementById('joinBtn');
            const messagesContainer = document.getElementById('messagesContainer');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const leaveBtn = document.getElementById('leaveBtn');
            const inviteBtn = document.getElementById('inviteBtn');
            const statusText = document.getElementById('statusText');
            const userCount = document.getElementById('userCount');
            const roomNameDisplay = document.getElementById('roomNameDisplay');

            // ===== متغیرها =====
            let ws = null;
            let username = '';
            let room = '';
            let password = '';
            let isConnected = false;

            // ===== ذخیره پیام‌ها =====
            let messages = [];

            // ===== افزودن پیام =====
            function addMessage(name, text, isSelf, time) {
                const empty = messagesContainer.querySelector('.empty-state');
                if (empty) empty.remove();

                const div = document.createElement('div');
                div.className = `msg ${isSelf ? 'msg-self' : 'msg-other'}`;

                const nameSpan = document.createElement('div');
                nameSpan.className = 'name';
                nameSpan.textContent = isSelf ? 'شما' : name;

                const textSpan = document.createElement('div');
                textSpan.textContent = text;

                const timeSpan = document.createElement('div');
                timeSpan.className = 'time';
                timeSpan.textContent = time || new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });

                div.appendChild(nameSpan);
                div.appendChild(textSpan);
                div.appendChild(timeSpan);

                messagesContainer.appendChild(div);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                messages.push({ name, text, isSelf, time: timeSpan.textContent });
            }

            // ===== اتصال WebSocket واقعی =====
            function connectWebSocket() {
                return new Promise((resolve, reject) => {
                    // استفاده از WebSocket عمومی برای تست (در صورت نیاز به سرور واقعی، باید خودت راه بندازی)
                    const wsUrl = 'wss://echo.websocket.org';
                    ws = new WebSocket(wsUrl);

                    ws.onopen = () => {
                        isConnected = true;
                        resolve();
                    };

                    ws.onerror = () => {
                        reject(new Error('اتصال به سرور امکان‌پذیر نیست. اینترنت را بررسی کن.'));
                    };

                    ws.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            if (data.type === 'message') {
                                const isSelf = data.sender === username;
                                addMessage(data.sender, data.text, isSelf, data.time);
                            }
                            if (data.type === 'users') {
                                userCount.textContent = '👤 ' + data.count + ' نفر';
                            }
                            if (data.type === 'join') {
                                addMessage('سیستم', data.sender + ' وارد شد 🟢', false);
                            }
                            if (data.type === 'leave') {
                                addMessage('سیستم', data.sender + ' خارج شد 🔴', false);
                            }
                        } catch (e) {
                            // پیام ساده
                            if (event.data.startsWith('MSG:')) {
                                const parts = event.data.split(':');
                                if (parts[1] === username) return;
                                addMessage(parts[1], parts[2] || 'پیام', false);
                            }
                        }
                    };

                    setTimeout(() => {
                        reject(new Error('اتصال زمان‌بر شد'));
                    }, 12000);
                });
            }

            // ===== ارسال پیام =====
            function sendMessage(text) {
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    alert('ارتباط قطع است');
                    return;
                }
                if (!text.trim()) return;

                const data = {
                    type: 'message',
                    sender: username,
                    text: text.trim(),
                    room: room,
                    password: password,
                    time: new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' })
                };
                ws.send(JSON.stringify(data));
                addMessage(username, text.trim(), true, data.time);
                messageInput.value = '';
            }

            // ===== ورود به اتاق =====
            joinBtn.addEventListener('click', async () => {
                const name = usernameInput.value.trim() || 'کاربر';
                const roomName = roomInput.value.trim() || 'POITX';
                const pass = passwordInput.value.trim() || '1234';

                if (name.length < 2) {
                    alert('نام باید حداقل ۲ حرف باشد');
                    return;
                }

                username = name;
                room = roomName;
                password = pass;

                joinBtn.disabled = true;
                joinBtn.textContent = '⏳ در حال اتصال...';

                try {
                    await connectWebSocket();

                    // ذخیره در localStorage
                    localStorage.setItem('poitx_username', username);
                    localStorage.setItem('poitx_room', room);
                    localStorage.setItem('poitx_password', password);

                    roomNameDisplay.textContent = room;
                    addMessage('سیستم', 'به اتاق ' + room + ' خوش آمدید ' + username + ' 👋', false);

                    joinSection.classList.add('hidden');
                    chatSection.style.display = 'flex';
                    chatSection.classList.remove('hidden');

                    statusText.innerHTML = '🟢 <span class="online">آنلاین</span>';
                    userCount.textContent = '👤 ۱ نفر';

                } catch (err) {
                    alert('خطا: ' + err.message);
                    if (ws) {
                        ws.close();
                        ws = null;
                    }
                    isConnected = false;
                } finally {
                    joinBtn.disabled = false;
                    joinBtn.textContent = 'ورود به اتاق';
                }
            });

            // ===== ارسال با دکمه =====
            sendBtn.addEventListener('click', () => {
                sendMessage(messageInput.value);
            });

            // ===== ارسال با Enter =====
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    sendMessage(messageInput.value);
                }
            });

            // ===== خروج =====
            leaveBtn.addEventListener('click', () => {
                if (ws) {
                    ws.send(JSON.stringify({ type: 'leave', sender: username, room: room }));
                    ws.close();
                    ws = null;
                }
                isConnected = false;

                chatSection.style.display = 'none';
                chatSection.classList.add('hidden');
                joinSection.classList.remove('hidden');

                statusText.innerHTML = '🔴 <span class="offline">خارج از گروه</span>';
                userCount.textContent = '👤 ۰ نفر';

                messagesContainer.innerHTML = `<div class="empty-state">✨ پیامی ارسال نشده است</div>`;
                messageInput.value = '';
            });

            // ===== کپی لینک =====
            inviteBtn.addEventListener('click', () => {
                const link = window.location.href;
                navigator.clipboard.writeText(link).then(() => {
                    alert('لینک کپی شد!\nاتاق: ' + room + '\nرمز: ' + password);
                }).catch(() => {
                    alert('لینک: ' + link + '\nاتاق: ' + room + '\nرمز: ' + password);
                });
            });

            // ===== قطع اتصال در صورت بسته شدن =====
            window.addEventListener('beforeunload', () => {
                if (ws) {
                    ws.send(JSON.stringify({ type: 'leave', sender: username, room: room }));
                    ws.close();
                }
            });

            // ===== بارگذاری اطلاعات قبلی =====
            const savedUser = localStorage.getItem('poitx_username');
            const savedRoom = localStorage.getItem('poitx_room');
            const savedPass = localStorage.getItem('poitx_password');

            if (savedUser) usernameInput.value = savedUser;
            if (savedRoom) roomInput.value = savedRoom;
            if (savedPass) passwordInput.value = savedPass;

        })();
    </script>

</body>
</html>
