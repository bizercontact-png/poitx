<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>پیام‌رسان POITX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b0b12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .app {
            width: 100%;
            max-width: 420px;
            background: #14141e;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
        }

        /* هدر */
        .header {
            padding: 18px 20px 14px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9;
        }
        .header .badge {
            font-size: 11px;
            color: #60a5fa;
            background: rgba(96, 165, 250, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* بخش ورود */
        .join-area {
            padding: 20px;
            flex-shrink: 0;
        }
        .join-area input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: #f1f5f9;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            margin-bottom: 10px;
        }
        .join-area input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }
        .join-area .btn-join {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .join-area .btn-join:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.25);
        }

        /* پیام‌ها */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(255, 255, 255, 0.01);
        }
        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeUp 0.3s ease;
            word-wrap: break-word;
        }
        .msg-self {
            align-self: flex-end;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-other {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.06);
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        .msg .name {
            font-size: 11px;
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 2px;
        }
        .msg .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
            text-align: left;
        }
        .msg-self .time {
            color: rgba(255, 255, 255, 0.6);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ورودی پیام */
        .input-area {
            padding: 12px 16px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.01);
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: #f1f5f9;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        .input-area input:focus {
            border-color: #4f46e5;
        }
        .input-area button {
            padding: 12px 20px;
            border: none;
            border-radius: 24px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }
        .input-area button:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3);
        }

        .input-area button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* وضعیت */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 20px 8px;
            font-size: 12px;
            color: #64748b;
            flex-shrink: 0;
        }
        .status-bar .online {
            color: #34d399;
        }
        .status-bar .offline {
            color: #ef4444;
        }

        .hidden {
            display: none !important;
        }

        .footer {
            text-align: center;
            font-size: 10px;
            color: #334155;
            padding: 8px 0 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            flex-shrink: 0;
        }
        .footer strong {
            color: #a78bfa;
            font-weight: 500;
        }

        /* خروج */
        .btn-leave {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-leave:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .empty-state {
            color: #475569;
            text-align: center;
            font-size: 14px;
            margin-top: 40px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="app" id="app">

        <!-- هدر -->
        <div class="header">
            <h1>💬 پیام‌رسان</h1>
            <span class="badge">POITX</span>
        </div>

        <!-- وضعیت -->
        <div class="status-bar">
            <span id="statusText">🔴 <span class="offline">خارج از گروه</span></span>
            <span id="userCount">👤 ۰ نفر</span>
        </div>

        <!-- بخش ورود -->
        <div id="joinSection" class="join-area">
            <input type="text" id="usernameInput" placeholder="نام خود را وارد کنید..." maxlength="20" />
            <input type="text" id="roomInput" placeholder="نام گروه (مثلاً: POITX)" value="POITX" />
            <button class="btn-join" id="joinBtn">ورود به گروه</button>
            <div style="font-size:12px; color:#475569; text-align:center; margin-top:10px;">
                با این نام وارد گروه می‌شوید
            </div>
        </div>

        <!-- بخش چت -->
        <div id="chatSection" class="hidden" style="display:flex; flex-direction:column; flex:1;">

            <div class="messages" id="messagesContainer">
                <div class="empty-state">✨ پیامی ارسال نشده است</div>
            </div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="پیام بنویسید..." />
                <button id="sendBtn">ارسال</button>
            </div>

            <div style="display:flex; justify-content:center; padding:4px 0 8px;">
                <button class="btn-leave" id="leaveBtn">🚪 خروج از گروه</button>
            </div>

            <div class="footer">
                ساخته شده توسط <strong>ابوالفضل</strong>
            </div>
        </div>

    </div>

    <script>
        (function() {

            // ===== عناصر =====
            const joinSection = document.getElementById('joinSection');
            const chatSection = document.getElementById('chatSection');

            const usernameInput = document.getElementById('usernameInput');
            const roomInput = document.getElementById('roomInput');
            const joinBtn = document.getElementById('joinBtn');

            const messagesContainer = document.getElementById('messagesContainer');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const leaveBtn = document.getElementById('leaveBtn');

            const statusText = document.getElementById('statusText');
            const userCount = document.getElementById('userCount');

            // ===== متغیرها =====
            let ws = null;
            let username = '';
            let room = '';
            let isConnected = false;

            // ===== پیام جدید به DOM =====
            function addMessage(name, text, isSelf) {
                // حذف empty-state
                const empty = messagesContainer.querySelector('.empty-state');
                if (empty) empty.remove();

                const div = document.createElement('div');
                div.className = `msg ${isSelf ? 'msg-self' : 'msg-other'}`;

                const nameSpan = document.createElement('div');
                nameSpan.className = 'name';
                nameSpan.textContent = isSelf ? 'شما' : name;

                const textSpan = document.createElement('div');
                textSpan.textContent = text;

                const timeSpan = document.createElement('div');
                timeSpan.className = 'time';
                const now = new Date();
                timeSpan.textContent = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2,
                '0');

                div.appendChild(nameSpan);
                div.appendChild(textSpan);
                div.appendChild(timeSpan);

                messagesContainer.appendChild(div);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            // ===== اتصال WebSocket =====
            function connectWebSocket() {
                return new Promise((resolve, reject) => {
                    const wsUrl = 'wss://echo.websocket.org';
                    ws = new WebSocket(wsUrl);

                    ws.onopen = () => {
                        isConnected = true;
                        resolve();
                    };

                    ws.onerror = () => {
                        reject(new Error('اتصال به سرور امکان‌پذیر نیست'));
                    };

                    ws.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            if (data.type === 'message') {
                                const isSelf = data.sender === username;
                                addMessage(data.sender, data.text, isSelf);
                            }
                            if (data.type === 'users') {
                                userCount.textContent = '👤 ' + data.count + ' نفر';
                            }
                        } catch (e) {
                            // پیام ساده
                            if (event.data.startsWith('USER:')) {
                                const parts = event.data.split(':');
                                if (parts[1] === username) return;
                                addMessage(parts[1], parts[2] || 'پیام', false);
                            }
                        }
                    };

                    setTimeout(() => {
                        reject(new Error('اتصال زمان‌بر شد'));
                    }, 10000);
                });
            }

            // ===== ارسال پیام =====
            function sendMessage(text) {
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    alert('ارتباط قطع است');
                    return;
                }
                if (!text.trim()) return;

                const data = {
                    type: 'message',
                    sender: username,
                    text: text.trim()
                };
                ws.send(JSON.stringify(data));
                addMessage(username, text.trim(), true);
                messageInput.value = '';
            }

            // ===== ورود به گروه =====
            joinBtn.addEventListener('click', async () => {
                const name = usernameInput.value.trim() || 'کاربر';
                const roomName = roomInput.value.trim() || 'POITX';

                if (name.length < 2) {
                    alert('نام باید حداقل ۲ حرف باشد');
                    return;
                }

                username = name;
                room = roomName;

                joinBtn.disabled = true;
                joinBtn.textContent = '⏳ در حال اتصال...';

                try {
                    await connectWebSocket();

                    // پیام خوش‌آمدگویی
                    addMessage('سیستم', 'به گروه ' + room + ' خوش آمدید ' + username + ' 👋', false);

                    joinSection.classList.add('hidden');
                    chatSection.style.display = 'flex';
                    chatSection.classList.remove('hidden');

                    statusText.innerHTML = '🟢 <span class="online">آنلاین</span>';
                    userCount.textContent = '👤 ۱ نفر';

                } catch (err) {
                    alert('خطا: ' + err.message);
                    if (ws) {
                        ws.close();
                        ws = null;
                    }
                    isConnected = false;
                } finally {
                    joinBtn.disabled = false;
                    joinBtn.textContent = 'ورود به گروه';
                }
            });

            // ===== ارسال با دکمه =====
            sendBtn.addEventListener('click', () => {
                sendMessage(messageInput.value);
            });

            // ===== ارسال با Enter =====
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    sendMessage(messageInput.value);
                }
            });

            // ===== خروج از گروه =====
            leaveBtn.addEventListener('click', () => {
                if (ws) {
                    ws.close();
                    ws = null;
                }
                isConnected = false;

                chatSection.style.display = 'none';
                chatSection.classList.add('hidden');
                joinSection.classList.remove('hidden');

                statusText.innerHTML = '🔴 <span class="offline">خارج از گروه</span>';
                userCount.textContent = '👤 ۰ نفر';

                messagesContainer.innerHTML = `<div class="empty-state">✨ پیامی ارسال نشده است</div>`;
                messageInput.value = '';
            });

            // ===== قطع اتصال در صورت بسته شدن مرورگر =====
            window.addEventListener('beforeunload', () => {
                if (ws) {
                    ws.close();
                }
            });

        })();
    </script>

</body>
</html>
