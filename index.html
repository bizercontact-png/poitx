<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberStream Live - Room Based Streaming</title>
    <style>
        /* ==================== Design System ==================== */
        :root {
            --neon-pink: #ff2d95;
            --neon-blue: #00f0ff;
            --neon-purple: #b400ff;
            --neon-green: #00ff88;
            --neon-yellow: #ffee00;
            --neon-red: #ff1744;
            
            --bg-abyss: #050510;
            --bg-deep: #0a0a1a;
            --bg-surface: #0f0f25;
            --bg-elevated: #151530;
            --glass-light: rgba(15, 15, 40, 0.6);
            --glass-medium: rgba(10, 10, 30, 0.8);
            --glass-heavy: rgba(5, 5, 20, 0.95);
            
            --border-subtle: rgba(0, 240, 255, 0.12);
            --border-default: rgba(0, 240, 255, 0.2);
            --border-bright: rgba(0, 240, 255, 0.4);
            --border-active: rgba(0, 240, 255, 0.7);
            
            --text-primary: #e8e8ff;
            --text-secondary: #b0b0d8;
            --text-muted: #7878a8;
            
            --shadow-blue: 0 0 30px rgba(0, 240, 255, 0.3);
            --shadow-pink: 0 0 30px rgba(255, 45, 149, 0.3);
            --shadow-red: 0 0 30px rgba(255, 23, 68, 0.4);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;
            
            --font-body: 'Vazirmatn', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-display: 'Orbitron', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg-abyss);
            color: var(--text-primary);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Vazirmatn:wght@100;200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

        /* ==================== Background ==================== */
        .cyber-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-gradient {
            position: absolute;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 15% 20%, rgba(0, 240, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 70%, rgba(180, 0, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 45, 149, 0.04) 0%, transparent 60%);
            animation: bgPulse 12s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .bg-grid {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        .particles-layer {
            position: absolute;
            width: 100%; height: 100%;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            animation: float linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* ==================== Join Screen ==================== */
        .join-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: var(--glass-heavy);
            backdrop-filter: blur(30px);
            transition: all 0.5s ease;
        }

        .join-screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

        .join-card {
            width: 480px;
            padding: 40px;
            background: var(--glass-medium);
            border: 1px solid var(--border-bright);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-blue);
            animation: cardGlow 3s ease-in-out infinite;
        }

        @keyframes cardGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 240, 255, 0.3); }
            50% { box-shadow: 0 0 50px rgba(0, 240, 255, 0.5), 0 0 80px rgba(0, 240, 255, 0.2); }
        }

        .join-logo {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: logoGlitch 5s infinite;
        }

        @keyframes logoGlitch {
            0%, 92%, 100% { transform: translate(0); }
            93% { transform: translate(-2px, 1px); }
            95% { transform: translate(2px, -1px); }
            97% { transform: translate(-1px, 2px); }
            99% { transform: translate(1px, -2px); }
        }

        .join-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
            font-family: var(--font-mono);
        }

        .tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--radius-lg);
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            border: 1px solid transparent;
        }

        .tab.active {
            background: rgba(0, 240, 255, 0.15);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .tab:hover:not(.active) {
            background: rgba(0, 240, 255, 0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.95rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .form-input::placeholder {
            color: #484868;
        }

        .invite-code-display {
            background: rgba(0, 0, 0, 0.6);
            border: 2px dashed var(--neon-purple);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .invite-code {
            font-family: var(--font-mono);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--neon-purple);
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(180, 0, 255, 0.5);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-lg);
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: white;
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 240, 255, 0.5);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-bright);
            color: var(--text-primary);
            margin-top: 10px;
        }

        .btn-secondary:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .copy-btn {
            background: rgba(180, 0, 255, 0.2);
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 8px 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: rgba(180, 0, 255, 0.3);
            box-shadow: 0 0 15px rgba(180, 0, 255, 0.3);
        }

        /* ==================== Stream Room ==================== */
        .room-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .room-container.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Stream Area */
        .stream-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-deep);
            border-right: 1px solid var(--border-subtle);
        }

        .stream-header {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: var(--glass-heavy);
            border-bottom: 1px solid var(--border-subtle);
            backdrop-filter: blur(20px);
        }

        .room-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .room-id {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 12px;
            border-radius: var(--radius-full);
            border: 1px solid var(--border-subtle);
        }

        .streamer-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .streamer-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            border: 2px solid var(--border-bright);
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            background: rgba(255, 23, 68, 0.2);
            border: 1px solid var(--neon-red);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            color: var(--neon-red);
            font-weight: 700;
            animation: livePulse 2s infinite;
        }

        @keyframes livePulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 23, 68, 0.3); }
            50% { box-shadow: 0 0 25px rgba(255, 23, 68, 0.7); }
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--neon-red);
            border-radius: 50%;
            animation: dotBlink 1s infinite;
        }

        @keyframes dotBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .stream-controls {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--glass-light);
            border: 1px solid var(--border-default);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        .icon-btn:hover {
            border-color: var(--border-bright);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .icon-btn.danger {
            border-color: var(--neon-red);
            color: var(--neon-red);
        }

        .icon-btn.danger:hover {
            box-shadow: 0 0 20px rgba(255, 23, 68, 0.4);
        }

        .stream-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stream-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .stream-placeholder {
            text-align: center;
            color: var(--text-muted);
        }

        .stream-placeholder .icon {
            font-size: 6rem;
            opacity: 0.3;
            margin-bottom: 20px;
        }

        /* Chat Sidebar */
        .chat-sidebar {
            width: 340px;
            display: flex;
            flex-direction: column;
            background: var(--bg-surface);
        }

        .chat-header {
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background: var(--glass-heavy);
            border-bottom: 1px solid var(--border-subtle);
            backdrop-filter: blur(20px);
            justify-content: space-between;
        }

        .chat-title {
            font-family: var(--font-display);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .viewer-count {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--neon-green);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border-default);
            border-radius: var(--radius-full);
        }

        .message {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .msg-user {
            font-weight: 700;
            font-size: 0.85rem;
        }

        .msg-user.streamer { color: var(--neon-blue); }
        .msg-user.viewer { color: var(--neon-pink); }

        .msg-badge {
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            background: rgba(0, 240, 255, 0.2);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
        }

        .msg-time {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-right: auto;
        }

        .msg-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            padding-right: 24px;
            line-height: 1.5;
        }

        .system-msg {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 8px;
            font-style: italic;
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid var(--border-subtle);
            background: var(--glass-heavy);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-full);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.85rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .chat-input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(0, 240, 255, 0.5);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }

        .toast {
            padding: 12px 24px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-bright);
            border-radius: var(--radius-full);
            animation: toastIn 0.3s ease-out;
            font-size: 0.9rem;
        }

        @keyframes toastIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .room-container {
                flex-direction: column;
            }
            .chat-sidebar {
                width: 100%;
                flex: 1;
            }
            .join-card {
                width: 90vw;
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="cyber-bg">
        <div class="bg-gradient"></div>
        <div class="bg-grid"></div>
        <div class="particles-layer" id="particles"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Join/Create Screen -->
    <div class="join-screen" id="joinScreen">
        <div class="join-card">
            <div class="join-logo">CYBERSTREAM</div>
            <div class="join-subtitle">Live Streaming Platform</div>
            
            <div class="tabs">
                <div class="tab active" id="tabCreate" onclick="switchTab('create')">🎥 ایجاد لایو جدید</div>
                <div class="tab" id="tabJoin" onclick="switchTab('join')">🔗 پیوستن به لایو</div>
            </div>

            <!-- Create Room Form -->
            <div id="createForm">
                <div class="form-group">
                    <label class="form-label">نام شما (استریمر)</label>
                    <input type="text" class="form-input" id="streamerName" placeholder="مثلاً: ابوالفضل" value="ابوالفضل">
                </div>
                <button class="btn btn-primary" onclick="createRoom()">
                    🚀 ایجاد لایو و دریافت کد دعوت
                </button>
                
                <div class="invite-code-display" id="inviteCodeDisplay" style="display: none; margin-top: 20px;">
                    <label class="form-label">🔑 کد دعوت لایو</label>
                    <div class="invite-code" id="inviteCode">------</div>
                    <button class="copy-btn" onclick="copyInviteCode()">📋 کپی کد دعوت</button>
                    <p style="margin-top: 12px; font-size: 0.8rem; color: var(--text-muted);">
                        این کد رو برای مهدیار بفرست تا بیاد لایو
                    </p>
                    <button class="btn btn-primary" style="margin-top: 12px;" onclick="startStreaming()">
                        🎥 شروع استریم دسکتاپ
                    </button>
                </div>
            </div>

            <!-- Join Room Form -->
            <div id="joinForm" style="display: none;">
                <div class="form-group">
                    <label class="form-label">نام شما (بیننده)</label>
                    <input type="text" class="form-input" id="viewerName" placeholder="مثلاً: مهدیار" value="مهدیار">
                </div>
                <div class="form-group">
                    <label class="form-label">کد دعوت</label>
                    <input type="text" class="form-input" id="inviteCodeInput" placeholder="کد ۶ رقمی رو وارد کن">
                </div>
                <button class="btn btn-primary" onclick="joinRoom()">
                    🔗 پیوستن به لایو
                </button>
            </div>
        </div>
    </div>

    <!-- Stream Room (Hidden initially) -->
    <div class="room-container" id="roomContainer">
        <!-- Stream Area -->
        <div class="stream-area">
            <div class="stream-header">
                <div class="room-info">
                    <div class="streamer-info">
                        <div class="streamer-avatar" id="roomAvatar">ا</div>
                        <div>
                            <div id="roomStreamerName" style="font-weight: 700;">ابوالفضل</div>
                            <span class="live-badge">
                                <span class="live-dot"></span> LIVE
                            </span>
                        </div>
                    </div>
                    <span class="room-id" id="roomIdDisplay">Room: ------</span>
                </div>
                <div class="stream-controls">
                    <button class="icon-btn" id="startStreamBtn" onclick="startScreenCapture()" title="شروع اشتراک صفحه">🖥️</button>
                    <button class="icon-btn danger" onclick="leaveRoom()" title="خروج">🚪</button>
                </div>
            </div>

            <div class="stream-container">
                <video class="stream-video" id="streamVideo" autoplay muted playsinline style="display: none;"></video>
                <div class="stream-placeholder" id="streamPlaceholder">
                    <div class="icon">📡</div>
                    <h3 id="placeholderText">در انتظار استریم...</h3>
                </div>
            </div>
        </div>

        <!-- Chat Sidebar -->
        <div class="chat-sidebar">
            <div class="chat-header">
                <span class="chat-title">💬 چت زنده</span>
                <span class="viewer-count" id="viewerCountDisplay">🟢 1 نفر</span>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <input type="text" class="chat-input" id="chatInput" placeholder="نظرت رو بنویس..." onkeypress="handleChatEnter(event)">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CyberStream Core ====================
        class CyberStream {
            constructor() {
                this.roomCode = null;
                this.userRole = null; // 'streamer' or 'viewer'
                this.userName = null;
                this.mediaStream = null;
                this.isStreaming = false;
                
                this.createParticles();
            }

            // ==================== Room Management ====================
            createRoom() {
                const name = document.getElementById('streamerName').value.trim();
                if (!name) {
                    this.showToast('⚠️ لطفاً نام خود را وارد کنید');
                    return;
                }

                // Generate unique 6-digit room code
                this.roomCode = Math.floor(100000 + Math.random() * 900000).toString();
                this.userRole = 'streamer';
                this.userName = name;

                // Store room data in localStorage (simulating server)
                const roomData = {
                    code: this.roomCode,
                    streamer: name,
                    createdAt: new Date().toISOString(),
                    isLive: false,
                    messages: []
                };
                localStorage.setItem(`room_${this.roomCode}`, JSON.stringify(roomData));

                // Show invite code
                document.getElementById('inviteCode').textContent = this.roomCode;
                document.getElementById('inviteCodeDisplay').style.display = 'block';
                document.getElementById('streamerName').disabled = true;

                this.showToast('✅ لایو با موفقیت ایجاد شد!');
                this.log(`Room created: ${this.roomCode} by ${name}`);
            }

            startStreaming() {
                document.getElementById('joinScreen').classList.add('hidden');
                document.getElementById('roomContainer').classList.add('active');
                
                // Update room UI
                document.getElementById('roomAvatar').textContent = this.userName.charAt(0);
                document.getElementById('roomStreamerName').textContent = this.userName;
                document.getElementById('roomIdDisplay').textContent = `Room: ${this.roomCode}`;
                
                // Add system message
                this.addSystemMessage(`🚀 ${this.userName} لایو رو شروع کرد`);
                this.addSystemMessage(`🔑 کد دعوت: ${this.roomCode}`);

                // Mark room as live
                this.updateRoomData({ isLive: true });

                // Simulate viewer joining (Mehdiar)
                setTimeout(() => {
                    this.simulateViewerJoin('مهدیار');
                }, 3000);
            }

            joinRoom() {
                const name = document.getElementById('viewerName').value.trim();
                const code = document.getElementById('inviteCodeInput').value.trim();

                if (!name || !code) {
                    this.showToast('⚠️ لطفاً نام و کد دعوت را وارد کنید');
                    return;
                }

                // Check if room exists
                const roomData = JSON.parse(localStorage.getItem(`room_${code}`));
                if (!roomData) {
                    this.showToast('❌ کد دعوت معتبر نیست');
                    return;
                }

                this.roomCode = code;
                this.userRole = 'viewer';
                this.userName = name;

                // Join the room
                document.getElementById('joinScreen').classList.add('hidden');
                document.getElementById('roomContainer').classList.add('active');
                
                document.getElementById('roomAvatar').textContent = roomData.streamer.charAt(0);
                document.getElementById('roomStreamerName').textContent = roomData.streamer;
                document.getElementById('roomIdDisplay').textContent = `Room: ${code}`;
                document.getElementById('placeholderText').textContent = 'در انتظار استریم استریمر...';
                
                // Hide start stream button for viewer
                document.getElementById('startStreamBtn').style.display = 'none';

                // Add system messages
                this.addSystemMessage(`👋 ${name} به لایو پیوست`);
                
                // Show existing messages
                if (roomData.messages && roomData.messages.length > 0) {
                    roomData.messages.forEach(msg => {
                        this.displayMessage(msg.user, msg.text, msg.role);
                    });
                }

                // If streamer is already live, simulate receiving stream
                if (roomData.isLive) {
                    this.addSystemMessage('🔴 استریمر در حال پخش است...');
                }

                this.showToast('✅ با موفقیت به لایو پیوستید!');
            }

            leaveRoom() {
                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                    this.mediaStream = null;
                }

                this.addSystemMessage(`👋 ${this.userName} از لایو خارج شد`);

                if (this.userRole === 'streamer') {
                    this.updateRoomData({ isLive: false });
                }

                // Reset UI
                document.getElementById('roomContainer').classList.remove('active');
                document.getElementById('joinScreen').classList.remove('hidden');
                document.getElementById('streamVideo').style.display = 'none';
                document.getElementById('streamPlaceholder').style.display = 'block';
                document.getElementById('startStreamBtn').style.display = 'inline-flex';
                document.getElementById('chatMessages').innerHTML = '';
                
                // Reset forms
                document.getElementById('streamerName').disabled = false;
                document.getElementById('inviteCodeDisplay').style.display = 'none';
                document.getElementById('inviteCode').textContent = '------';

                this.roomCode = null;
                this.userRole = null;
                this.userName = null;
                this.isStreaming = false;
            }

            // ==================== Screen Capture ====================
            async startScreenCapture() {
                if (this.userRole !== 'streamer') return;

                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({
                        video: { cursor: 'always' },
                        audio: true
                    });

                    this.mediaStream = stream;
                    this.isStreaming = true;

                    const video = document.getElementById('streamVideo');
                    video.srcObject = stream;
                    video.style.display = 'block';
                    document.getElementById('streamPlaceholder').style.display = 'none';
                    document.getElementById('startStreamBtn').style.display = 'none';

                    this.addSystemMessage('🖥️ استریمر صفحه نمایش خود را به اشتراک گذاشت');
                    this.updateRoomData({ isLive: true });

                    // Handle stream stop
                    stream.getVideoTracks()[0].addEventListener('ended', () => {
                        this.stopScreenCapture();
                    });

                } catch (error) {
                    this.showToast('❌ خطا در اشتراک‌گذاری صفحه: ' + error.message);
                }
            }

            stopScreenCapture() {
                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                    this.mediaStream = null;
                }

                this.isStreaming = false;
                document.getElementById('streamVideo').style.display = 'none';
                document.getElementById('streamPlaceholder').style.display = 'block';
                document.getElementById('startStreamBtn').style.display = 'inline-flex';
                
                this.addSystemMessage('⏹️ استریمر اشتراک صفحه را متوقف کرد');
                this.updateRoomData({ isLive: false });
            }

            // ==================== Chat System ====================
            sendMessage() {
                const input = document.getElementById('chatInput');
                const text = input.value.trim();
                
                if (!text) return;

                this.displayMessage(this.userName, text, this.userRole);
                this.saveMessage(this.userName, text, this.userRole);
                
                input.value = '';

                // Simulate response from the other user
                if (this.userRole === 'streamer') {
                    // If streamer sends message, simulate viewer response
                    setTimeout(() => {
                        this.simulateViewerMessage(text);
                    }, 1500 + Math.random() * 2000);
                } else {
                    // If viewer sends message, simulate streamer response
                    setTimeout(() => {
                        this.simulateStreamerMessage(text);
                    }, 1500 + Math.random() * 2000);
                }
            }

            displayMessage(username, text, role) {
                const chatMessages = document.getElementById('chatMessages');
                const now = new Date();
                const timeStr = now.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });

                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.innerHTML = `
                    <div class="msg-header">
                        <span class="msg-user ${role}">${this.escapeHtml(username)}</span>
                        ${role === 'streamer' ? '<span class="msg-badge">STR</span>' : ''}
                        <span class="msg-time">${timeStr}</span>
                    </div>
                    <div class="msg-text">${this.escapeHtml(text)}</div>
                `;

                chatMessages.appendChild(msgDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            addSystemMessage(text) {
                const chatMessages = document.getElementById('chatMessages');
                const div = document.createElement('div');
                div.className = 'system-msg';
                div.textContent = text;
                chatMessages.appendChild(div);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            saveMessage(username, text, role) {
                const roomData = JSON.parse(localStorage.getItem(`room_${this.roomCode}`));
                if (roomData) {
                    if (!roomData.messages) roomData.messages = [];
                    roomData.messages.push({
                        user: username,
                        text: text,
                        role: role,
                        time: new Date().toISOString()
                    });
                    localStorage.setItem(`room_${this.roomCode}`, JSON.stringify(roomData));
                }
            }

            // ==================== Simulation ====================
            simulateViewerJoin(viewerName) {
                this.addSystemMessage(`👋 ${viewerName} به لایو پیوست`);
                document.getElementById('viewerCountDisplay').textContent = '🟢 2 نفر';
                
                // Simulate first message from viewer
                setTimeout(() => {
                    this.displayMessage(viewerName, 'سلام ابوالفضل! لایو رو دیدم، عالیه 🎉', 'viewer');
                    this.saveMessage(viewerName, 'سلام ابوالفضل! لایو رو دیدم، عالیه 🎉', 'viewer');
                }, 2000);
            }

            simulateViewerMessage(streamerMsg) {
                const responses = [
                    'درسته! 👍',
                    'جالبه، ادامه بده 🚀',
                    'متوجه شدم 👌',
                    'باحاله! 😎',
                    'دقیقاً موافقم 💯',
                    'حرفه‌ای داری کار می‌کنی 🔥',
                    'میشه بیشتر توضیح بدی؟ 🤔',
                    'آها! الان فهمیدم ✨'
                ];
                const response = responses[Math.floor(Math.random() * responses.length)];
                this.displayMessage('مهدیار', response, 'viewer');
                this.saveMessage('مهدیار', response, 'viewer');
            }

            simulateStreamerMessage(viewerMsg) {
                const responses = [
                    'مرسی! 🙏',
                    'خوشحالم که دوست داری',
                    'چشم، حتماً',
                    'نظر لطفتونه',
                    'باشه، ادامه میدم',
                    'سوالی داری بپرس'
                ];
                const response = responses[Math.floor(Math.random() * responses.length)];
                const streamerName = document.getElementById('roomStreamerName').textContent;
                this.displayMessage(streamerName, response, 'streamer');
                this.saveMessage(streamerName, response, 'streamer');
            }

            // ==================== Utility ====================
            updateRoomData(data) {
                const roomData = JSON.parse(localStorage.getItem(`room_${this.roomCode}`));
                if (roomData) {
                    Object.assign(roomData, data);
                    localStorage.setItem(`room_${this.roomCode}`, JSON.stringify(roomData));
                }
            }

            showToast(message) {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            createParticles() {
                const container = document.getElementById('particles');
                for (let i = 0; i < 30; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = Math.random() * 100 + '%';
                    p.style.animationDuration = (Math.random() * 10 + 8) + 's';
                    p.style.animationDelay = Math.random() * 10 + 's';
                    p.style.width = (Math.random() * 3 + 1) + 'px';
                    p.style.height = p.style.width;
                    container.appendChild(p);
                }
            }

            escapeHtml(text) {
                const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
                return text.replace(/[&<>"']/g, m => map[m]);
            }

            log(message) {
                console.log(`[CyberStream] ${message}`);
            }
        }

        // ==================== Initialize ====================
        const app = new CyberStream();

        // ==================== Global Functions ====================
        function switchTab(tab) {
            document.getElementById('tabCreate').classList.toggle('active', tab === 'create');
            document.getElementById('tabJoin').classList.toggle('active', tab === 'join');
            document.getElementById('createForm').style.display = tab === 'create' ? 'block' : 'none';
            document.getElementById('joinForm').style.display = tab === 'join' ? 'block' : 'none';
        }

        function createRoom() { app.createRoom(); }
        function startStreaming() { app.startStreaming(); }
        function joinRoom() { app.joinRoom(); }
        function leaveRoom() { app.leaveRoom(); }
        function startScreenCapture() { app.startScreenCapture(); }
        function sendMessage() { app.sendMessage(); }
        
        function handleChatEnter(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                app.sendMessage();
            }
        }

        function copyInviteCode() {
            const code = document.getElementById('inviteCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                app.showToast('📋 کد دعوت کپی شد! برای مهدیار بفرست');
            });
        }
    </script>
</body>
</html>
