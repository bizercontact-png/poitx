<div class="cyber-card" style="
    border-left: 3px solid ${isSelf ? '#00f0ff' : '#ff2d95'};
    text-align: ${isSelf ? 'right' : 'left'};
    background: ${isSelf ? 'rgba(0,240,255,0.05)' : 'rgba(255,45,149,0.05)'};
    margin-bottom: 8px;
">
    <div style="color: ${isSelf ? '#00f0ff' : '#ff2d95'}; font-size: 12px;">
        ${sender} • ${time}
    </div>
    <div style="font-size: 14px; margin-top: 4px;">${text}</div>
</div>
